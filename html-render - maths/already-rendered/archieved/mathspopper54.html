<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Math Popper</title>

<!--v54 Sequencing corrected -->
<style>
html, body {
    margin: 0;
    height: 100%;
    background: #0a0a0a;
    color: white;
    font-family: Arial, sans-serif;
}

#outer {
    margin: 20px;
    margin-bottom: 0;
    height: calc(100vh - 40px - 64px);
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow: hidden;
}

/* CONTROL PANEL */
#control {
    position: sticky;
    top: 0;
    z-index: 10;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px 16px;
    background: #0a0a0a;
    border: 1px solid #444;
    padding: 16px;
}

#control legend { padding: 0 10px; font-size: 18px; color: #aaa; }

.ctrl-item {
    display: flex;
    align-items: center;
    gap: 12px;
    white-space: nowrap;
    font-size: 20px;
    padding: 6px 0;
    color: #28a745;
}

.ctrl-item input[type="checkbox"] { width: 22px; height: 22px; }

/* CONTROL PANEL WRAPPER */
#control-container {
    display: flex;
    flex-direction: column;
    transition: flex-basis 0.3s ease, min-height 0.3s ease;
    min-height: 40px;
    overflow: hidden;
}

#control-container.shrink {
    flex-basis: auto;
    min-height: 64px;
    padding: 4px 8px;
    border: 1px solid #333;
    border-radius: 8px;
    background: linear-gradient(135deg, #111 0%, #1a1a2e 100%);
}

#control-container.shrink #control { display: none; }

/* TOP BAR */
#control-top-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    min-height: 52px;
}

#control-top-bar label, #control-top-bar span { font-size: 16px; }

/* BUTTONS */
button {
    padding: 8px 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    font-weight: bold;
    transition: transform 0.15s ease, filter 0.15s ease, box-shadow 0.15s ease;
}

button:hover  { transform: scale(1.06); filter: brightness(1.2); }
button:active { transform: scale(0.97); }

/* Green buttons */
#selectAllBtn, #toggleAll {
    background: #28a745;
    color: #fff;
    box-shadow: 0 0 8px rgba(40,167,69,0.5);
}
#selectAllBtn:hover, #toggleAll:hover { box-shadow: 0 0 16px rgba(40,167,69,0.9); }

/* Blue nav buttons */
.nav-btn {
    background: #0077cc;
    color: #fff;
    font-weight: bold;
    box-shadow: 0 0 8px rgba(0,119,204,0.5);
}
.nav-btn:hover { background: #0099ff; box-shadow: 0 0 16px rgba(0,153,255,0.9); }

/* Timer */
#timerBtn { background: #28a745; color: #fff; box-shadow: 0 0 8px rgba(40,167,69,0.5); }
#resetTimer { background: #555; color: #fff; }
#timerDisplay {
    font-size: 18px;
    font-weight: bold;
    color: #00c8ff;
    min-width: 56px;
    letter-spacing: 2px;
}

/* DATE-TIME BOX */
#dateBox {
    font-size: 14px;
    font-weight: bold;
    color: #28a745;
    background: #0d1a0d;
    border: 1px solid #28a745;
    border-radius: 6px;
    padding: 4px 10px;
    letter-spacing: 0.5px;
    white-space: nowrap;
}

/* QUESTIONS PANEL */
#questions {
    position: relative;
    overflow: hidden;
    border: 1px solid #333;
    border-radius: 8px;
    flex: 1;
    min-height: 0;
    padding: 8px;
    box-sizing: border-box;
}

#questions legend { padding: 0 10px; font-size: 16px; color: #aaa; }

/* STACK WRAPPER - carousel */
.stack-wrapper {
    display: none;
    position: absolute;
    top: 8px; left: 8px; right: 8px; bottom: 8px;
    overflow: hidden;
    box-sizing: border-box;
}

.stack-wrapper.visible-stack {
    display: block;
    position: absolute;
    overflow-y: auto;
    overflow-x: hidden;
}

.stack-wrapper::-webkit-scrollbar { width: 10px; }
.stack-wrapper::-webkit-scrollbar-track { background: #111; }
.stack-wrapper::-webkit-scrollbar-thumb { background-color: #555; border-radius: 6px; border: 2px solid #111; }
.stack-wrapper::-webkit-scrollbar-thumb:hover { background-color: #888; }

/* auto-size for long content types */
.stack-wrapper.auto-size { height: auto; min-height: 100%; }

/* SINGLE FULL-WIDTH BOX */
.stack-box {
    border: 1px solid #2a2a2a;
    border-left: 4px solid #28a745;
    border-radius: 6px;
    background: #111;
    padding: 16px 20px;
    box-sizing: border-box;
    width: 100%;
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
}

.stack-box.auto-size { height: auto; }

/* TITLES */
.problem-title {
    color: #28a745;
    font-weight: bold;
    margin-bottom: 8px;
    font-size: 24px;
}

/* QUESTION ROWS */
.question-row {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    font-size: 40px;
    line-height: 2;
    padding: 4px 0 4px 20px;
    border-bottom: 1px solid #1e1e1e;
}

.question-letter {
    width: 60px;
    text-align: right;
    margin-right: 20px;
    font-weight: bold;
    flex-shrink: 0;
}

.question-text { flex: 1; min-width: 0; }

/* WORD ROW layout */
.question-row.word-row {
    flex-direction: column;
    align-items: flex-start;
    padding-bottom: 12px;
}

.question-row.word-row .word-top {
    display: flex;
    align-items: baseline;
    width: 100%;
}

.question-row.word-row .word-answer-line {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 8px;
    padding-left: 80px;
    font-size: 30px;
}

/* INLINE ANSWER */
.inline-answer-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-left: 16px;
    flex-shrink: 0;
}

.answer {
    visibility: hidden;
    color: #58D68D;
    font-weight: bold;
}

.answer.show { visibility: visible; }

.answer-input {
    width: 110px;
    height: 36px;
    background: #000;
    color: #fff;
    border: 1px solid #444;
    border-radius: 6px;
    text-align: center;
    font-size: 22px;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

.answer-input:focus {
    border-color: #00c8ff;
    box-shadow: 0 0 8px rgba(0,200,255,0.6);
}

/* NUMBER NAMES word reveal */
.num-word {
    visibility: hidden;
    color: #58D68D;
    font-weight: bold;
    font-size: 0.65em;
    margin-left: 16px;
}

/* STEP-BY-STEP WORKING */
.working-block {
    display: none;
    margin: 6px 0 6px 80px;
    padding: 8px 14px;
    background: #0d1a0d;
    border-left: 3px solid #28a745;
    border-radius: 4px;
    font-size: 17px;
    color: #aaa;
    line-height: 1.9;
    max-width: 600px;
}

.working-block.show { display: block; }
.working-block .w-step   { color: #58D68D; font-weight: bold; }
.working-block .w-label  { color: #ff9900; font-size: 0.8em; margin-right: 6px; }
.working-block .w-result { color: #00c8ff; font-weight: bold; }

/* BOTTOM NAV */
#bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 8px 20px;
    background: #0f0f0f;
    border-top: 1px solid #333;
    z-index: 100;
    box-sizing: border-box;
}

#bottom-nav button { padding: 12px 32px; font-size: 18px; border-radius: 12px; }

#bottom-qCounter {
    font-size: 20px;
    font-weight: bold;
    color: #00c8ff;
    min-width: 80px;
    text-align: center;
    letter-spacing: 2px;
}

/* CONFETTI */
@keyframes confettiFall {
    0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(420px) rotate(720deg) scale(0.4); opacity: 0; }
}

.confetti-piece {
    position: fixed;
    width: 10px; height: 10px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 9999;
    animation: confettiFall linear forwards;
}

/* ANIMAL RUN */
@keyframes animalRunRight {
    0%   { transform: translateX(-120px) scaleX(1); }
    100% { transform: translateX(calc(100vw + 120px)) scaleX(1); }
}
@keyframes animalRunLeft {
    0%   { transform: translateX(calc(100vw + 120px)) scaleX(-1); }
    100% { transform: translateX(-120px) scaleX(-1); }
}

.animal-runner {
    position: fixed;
    bottom: 72px;
    font-size: 52px;
    pointer-events: none;
    z-index: 9998;
    line-height: 1;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
}

/* RAINBOW GLOW */
@keyframes rainbowGlow {
    0%   { outline-color: #ff004c; }
    20%  { outline-color: #ff9900; }
    40%  { outline-color: #ffee00; }
    60%  { outline-color: #28a745; }
    80%  { outline-color: #00c8ff; }
    100% { outline-color: #ff004c; }
}

.stack-wrapper.visible-stack::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    border: 3px solid transparent;
    animation: rainbowGlow 4s linear infinite;
    z-index: 0;
}
</style>
</head>
<body>

<div id="outer">
    <div id="control-container" class="shrink">
        <div id="control-top-bar" style="margin:4px 8px;">
            <button id="selectAllBtn">All Qs</button>
            <label style="display:flex;align-items:center;gap:8px;font-size:16px;">
                <input type="checkbox" id="control-toggle" />

</div>

<div id="bottom-nav">

</div>

<script>
const BASE_URL = "https://raw.githubusercontent.com/nerdysrisha/vidyarambha/refs/heads/main/maths/questions/";

// Date/time box
function updateDateBox() {
    const now = new Date();
    const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const d = `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
    const h = String(now.getHours()).padStart(2,"0");
    const m = String(now.getMinutes()).padStart(2,"0");
    const s = String(now.getSeconds()).padStart(2,"0");
    document.getElementById("dateBox").textContent = `📅 ${d}  🕐 ${h}:${m}:${s}`;
}
updateDateBox();
setInterval(updateDateBox, 1000);

const options = [
    ["number-names",         "1. Number Names"],
    ["ascending-order",      "2. Ascending Order"],
    ["descending-order",     "3. Descending Order"],
    ["neg-pos-numbers",      "4. +ve/-ve Numbers"],
    ["word-problems",        "5. Word Problems"],
    ["addend-left-missing",  "6. Find Left Addend"],
    ["addend-right-missing", "7. Find Right Addend"],
    ["subtract-no-borrow",   "8. Subtract - No Borrow"],
    ["subtract-with-borrow", "9. Subtract - With Borrow"],
    ["minuend-missing",      "10. Find Minuend"],
    ["subtrahend-missing",   "11. Find Subtrahend"],
    ["multiply-2-digit",     "12. Multiply 2 Digits"],
    ["factor-left-missing",  "13. Find Left Factor"],
    ["factor-right-missing", "14. Find Right Factor"],
    ["basic-divisions",      "15. Divisions"],
    ["dividend-missing",     "16. Find Dividend"],
    ["divisor-missing",      "17. Find Divisor"],
    ["bodmas",               "18. Solve BODMAS"],
    ["pattern-completion",   "19. Pattern Completion"],
    ["draw-clock",           "20. Draw Clock"],
    ["tell-time",            "21. Tell Time"],
    ["drawing-shapes",       "22. Drawing Shapes"],
    ["geometric-shapes",     "23. Geometric Shapes"],
    ["spell-the-word",       "24. Spell the Word"],
    ["true-or-false",        "25. True or False"],
    ["missing-number",       "26. Missing Number"],
    ["simple-equations",     "27. Simple Equations"],
    ["general-knowledge",    "28. General Knowledge"],
    ["units-length",         "29. Units - Length"],
    ["units-weight",         "30. Units - Weight"],
    ["units-liquid",         "31. Units - Liquid"],
    ["units-time",           "32. Units - Time"],
    ["units-money",          "33. Units - Money"]
];

const control   = document.getElementById("control");
const questions = document.getElementById("questions");
const toggleAll = document.getElementById("toggleAll");
let showAll = false;
const stacks = {};

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function numberToWords(n) {
    const ones = ["","one","two","three","four","five","six","seven","eight","nine",
                  "ten","eleven","twelve","thirteen","fourteen","fifteen","sixteen",
                  "seventeen","eighteen","nineteen"];
    const tens = ["","","twenty","thirty","forty","fifty","sixty","seventy","eighty","ninety"];
    if (n === 0) return "zero";
    if (n < 20)  return ones[n];
    if (n < 100) return tens[Math.floor(n/10)] + (n%10 ? " "+ones[n%10] : "");
    if (n < 1000) {
        const r = n % 100;
        return ones[Math.floor(n/100)] + " hundred" + (r ? " "+numberToWords(r) : "");
    }
    const r = n % 1000;
    return numberToWords(Math.floor(n/1000)) + " thousand" + (r ? " "+numberToWords(r) : "");
}

options.forEach(([val, label]) => {
    const wrap = document.createElement("label");
    wrap.className = "ctrl-item";
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.onchange = () => cb.checked ? addStack(val) : removeStack(val);
    wrap.append(cb, document.createTextNode(label));
    control.appendChild(wrap);
});

const selectAllBtn = document.getElementById("selectAllBtn");
const checkboxes   = Array.from(control.querySelectorAll("input[type='checkbox']"));

selectAllBtn.onclick = async () => {
    for (let cb of checkboxes) {
        if (!cb.checked) {
            cb.checked = true;
            cb.onchange();
            await new Promise(r => setTimeout(r, 500));
        }
    }
};

// ── BODMAS STEP-BY-STEP ───────────────────────────────────────────────────────
function bodmasSteps(expr) {
    let e = expr.replace(/🧠\s*/,"").replace(/\s*\(Q\d+\)/,"").trim();
    e = e.replace(/×/g,"*").replace(/÷/g,"/").replace(/x/gi,"*");
    const steps = [];
    let cur = e, prev, iter;

    prev = cur; iter = 0;
    while (/\(/.test(cur) && iter++ < 20) {
        cur = cur.replace(/\(([^()]+)\)/g, (_,inner) => { try { return String(eval(inner)); } catch(e) { return _; } });
        if (cur !== prev) steps.push({label:"Brackets", expr:cur});
        prev = cur;
    }
    prev = cur; iter = 0;
    while (/[\d.]+\s*[*/]\s*[\d.]+/.test(cur) && iter++ < 20) {
        cur = cur.replace(/([\d.]+)\s*([*/])\s*([\d.]+)/, (_,a,op,b) => {
            const v = op==="*" ? parseFloat(a)*parseFloat(b) : parseFloat(a)/parseFloat(b);
            return String(Number.isInteger(v)?v:parseFloat(v.toFixed(4)));
        });
        if (cur !== prev) steps.push({label:"× ÷", expr:cur});
        prev = cur;
    }
    prev = cur; iter = 0;
    while (/([\d.]+)\s*([+\-])\s*([\d.]+)/.test(cur) && iter++ < 20) {
        cur = cur.replace(/([\d.]+)\s*([+\-])\s*([\d.]+)/, (_,a,op,b) => {
            const v = op==="+" ? parseFloat(a)+parseFloat(b) : parseFloat(a)-parseFloat(b);
            return String(Number.isInteger(v)?v:parseFloat(v.toFixed(4)));
        });
        if (cur !== prev) steps.push({label:"+ −", expr:cur});
        prev = cur;
    }
    steps.push({label:"Answer", expr:`<span class="w-result">${cur.replace(/\*/g,"×").replace(/\//g,"÷")}</span>`});
    return steps;
}

// ── MISSING EQUATION WORKING ──────────────────────────────────────────────────
function missingWorking(qText) {
    const clean = qText.replace(/🔍\s*/,"").replace(/\s*\(Q\d+\)/,"").replace(/\s*=\s*/," = ").trim();
    let m;
    if ((m = clean.match(/^__\s*\+\s*([\d.]+)\s*=\s*([\d.]+)/))) return [`<span class="w-label">Reverse:</span> ${m[2]} − ${m[1]} = <span class="w-step">${parseFloat(m[2])-parseFloat(m[1])}</span>`];
    if ((m = clean.match(/^([\d.]+)\s*\+\s*__\s*=\s*([\d.]+)/))) return [`<span class="w-label">Reverse:</span> ${m[2]} − ${m[1]} = <span class="w-step">${parseFloat(m[2])-parseFloat(m[1])}</span>`];
    if ((m = clean.match(/^__\s*[-−]\s*([\d.]+)\s*=\s*([\d.]+)/))) return [`<span class="w-label">Reverse:</span> ${m[2]} + ${m[1]} = <span class="w-step">${parseFloat(m[2])+parseFloat(m[1])}</span>`];
    if ((m = clean.match(/^([\d.]+)\s*[-−]\s*__\s*=\s*([\d.]+)/))) return [`<span class="w-label">Reverse:</span> ${m[1]} − ${m[2]} = <span class="w-step">${parseFloat(m[1])-parseFloat(m[2])}</span>`];
    if ((m = clean.match(/^__\s*[×x\*]\s*([\d.]+)\s*=\s*([\d.]+)/i))) return [`<span class="w-label">Reverse:</span> ${m[2]} ÷ ${m[1]} = <span class="w-step">${parseFloat(m[2])/parseFloat(m[1])}</span>`];
    if ((m = clean.match(/^([\d.]+)\s*[×x\*]\s*__\s*=\s*([\d.]+)/i))) return [`<span class="w-label">Reverse:</span> ${m[2]} ÷ ${m[1]} = <span class="w-step">${parseFloat(m[2])/parseFloat(m[1])}</span>`];
    if ((m = clean.match(/^__\s*[÷\/]\s*([\d.]+)\s*=\s*([\d.]+)/))) return [`<span class="w-label">Reverse:</span> ${m[2]} × ${m[1]} = <span class="w-step">${parseFloat(m[2])*parseFloat(m[1])}</span>`];
    if ((m = clean.match(/^([\d.]+)\s*[÷\/]\s*__\s*=\s*([\d.]+)/))) return [`<span class="w-label">Reverse:</span> ${m[1]} ÷ ${m[2]} = <span class="w-step">${parseFloat(m[1])/parseFloat(m[2])}</span>`];
    return [];
}

function sequenceWorking(qText) {
    const clean = qText.replace(/🔍\s*/,"").replace(/\s*\(Q\d+\)/,"").trim();
    const parts = clean.split(",").map(s=>s.trim());
    const nums  = parts.map(p => p==="__" ? null : parseFloat(p));
    const known = nums.filter(n=>n!==null);
    if (known.length < 2) return [];
    const diffs = [];
    for (let i=1;i<known.length;i++) diffs.push(known[i]-known[i-1]);
    const allSame = diffs.every(d=>d===diffs[0]);
    if (allSame) return [`<span class="w-label">Pattern:</span> each number ${diffs[0]>=0?"+":""}${diffs[0]}`];
    return [`<span class="w-label">Look at the pattern carefully</span>`];
}

const MISSING_TYPES = new Set([
    "addend-left-missing","addend-right-missing",
    "minuend-missing","subtrahend-missing",
    "factor-left-missing","factor-right-missing",
    "dividend-missing","divisor-missing"
]);

// ── DRAW CLOCK ────────────────────────────────────────────────────────────────
function drawClock(canvas, timeStr) {
    const size = canvas.width, cx = size/2, cy = size/2, r = size/2-6;
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0,0,size,size);
    ctx.beginPath(); ctx.arc(cx,cy,r,0,2*Math.PI);
    ctx.fillStyle="#1a1a2e"; ctx.fill();
    ctx.strokeStyle="#00c8ff"; ctx.lineWidth=3; ctx.stroke();
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillStyle="#ffffff"; ctx.font=`bold ${size*0.09}px Arial`;
    for (let h=1;h<=12;h++) {
        const angle=(h/6)*Math.PI-Math.PI/2, nr=r*0.78;
        ctx.fillText(h, cx+nr*Math.cos(angle), cy+nr*Math.sin(angle));
        const t1x=cx+r*0.88*Math.cos(angle),t1y=cy+r*0.88*Math.sin(angle);
        const t2x=cx+r*0.97*Math.cos(angle),t2y=cy+r*0.97*Math.sin(angle);
        ctx.beginPath(); ctx.moveTo(t1x,t1y); ctx.lineTo(t2x,t2y);
        ctx.strokeStyle="#555"; ctx.lineWidth=2; ctx.stroke();
    }
    const [hRaw,mRaw]=timeStr.split(":").map(Number);
    const hours=hRaw%12, minutes=mRaw;
    const minAngle=(minutes/60)*2*Math.PI-Math.PI/2;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.lineTo(cx+r*0.75*Math.cos(minAngle),cy+r*0.75*Math.sin(minAngle));
    ctx.strokeStyle="#58D68D"; ctx.lineWidth=size*0.025; ctx.lineCap="round"; ctx.stroke();
    const hourAngle=((hours+minutes/60)/12)*2*Math.PI-Math.PI/2;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.lineTo(cx+r*0.5*Math.cos(hourAngle),cy+r*0.5*Math.sin(hourAngle));
    ctx.strokeStyle="#ff9900"; ctx.lineWidth=size*0.04; ctx.lineCap="round"; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx,cy,size*0.035,0,2*Math.PI);
    ctx.fillStyle="#ffffff"; ctx.fill();
}

// ── TOGGLE SHOW/HIDE ──────────────────────────────────────────────────────────
toggleAll.onclick = () => {
    if (!showAll) {
        if (prompt("Enter PIN") !== "0000") return;
    }
    showAll = !showAll;
    document.querySelectorAll(".answer").forEach(a => a.classList.toggle("show", showAll));
    document.querySelectorAll(".num-word").forEach(el => { el.style.visibility = showAll ? "visible" : "hidden"; });
    document.querySelectorAll("#questions .question-row img").forEach(img => { img.style.display = showAll ? "block" : "none"; });
    document.querySelectorAll("canvas.clock-answer").forEach(canvas => {
        if (showAll) { canvas.style.display="block"; drawClock(canvas, canvas.dataset.time); }
        else { canvas.style.display="none"; canvas.getContext("2d").clearRect(0,0,canvas.width,canvas.height); }
    });
    document.querySelectorAll(".working-block").forEach(wb => wb.classList.toggle("show", showAll));

    if (showAll) {
        document.querySelectorAll(".question-row[data-type='bodmas']").forEach(row => {
            if (row.querySelector(".working-block")) return;
            const qSpan = row.querySelector(".question-text");
            if (!qSpan) return;
            const steps = bodmasSteps(qSpan.innerText||"");
            if (!steps.length) return;
            const wb = document.createElement("div");
            wb.className = "working-block show";
            const displayExpr = e => e.replace(/\*/g,"×").replace(/\//g,"÷");
            wb.innerHTML = steps.map((s,i) => `<div><span class="w-label">Step ${i+1} (${s.label}):</span> ${s.expr.includes("w-result")?s.expr:displayExpr(s.expr)}</div>`).join("");
            row.appendChild(wb);
        });
        document.querySelectorAll(".question-row[data-type='missing']").forEach(row => {
            if (row.querySelector(".working-block")) return;
            const qSpan = row.querySelector(".question-text");
            if (!qSpan) return;
            const lines = missingWorking(qSpan.innerText||"");
            if (!lines.length) return;
            const wb = document.createElement("div");
            wb.className = "working-block show";
            wb.innerHTML = lines.map(l=>`<div>${l}</div>`).join("");
            row.appendChild(wb);
        });
        document.querySelectorAll(".question-row[data-type='sequence']").forEach(row => {
            if (row.querySelector(".working-block")) return;
            const qSpan = row.querySelector(".question-text");
            if (!qSpan) return;
            const lines = sequenceWorking(qSpan.innerText||"");
            if (!lines.length) return;
            const wb = document.createElement("div");
            wb.className = "working-block show";
            wb.innerHTML = lines.map(l=>`<div>${l}</div>`).join("");
            row.appendChild(wb);
        });
    }
    toggleAll.textContent = showAll ? "Hide" : "Show";
};

// ── STACK MANAGEMENT ──────────────────────────────────────────────────────────
const AUTO_SIZE = new Set(["word-problems","bodmas","simple-equations",
    "units-length","units-weight","units-liquid","units-time","units-money",
    "spell-the-word","general-knowledge","missing-number","pattern-completion",
    "true-or-false","neg-pos-numbers","ascending-order","descending-order",
    "number-names","draw-clock"]);

function addStack(val) {
    if (stacks[val]) return;
    const wrapper = document.createElement("div");
    wrapper.className = "stack-wrapper" + (AUTO_SIZE.has(val) ? " auto-size" : "");
    const box = document.createElement("div");
    box.className = "stack-box";
    wrapper.appendChild(box);
    stacks[val] = wrapper;
    stackOrder.push(val);
    questions.appendChild(wrapper);
    generate(box, val);
    navigateTo(stackOrder.length - 1, "next");
}

function removeStack(val) {
    stacks[val]?.remove();
    delete stacks[val];
    const idx = stackOrder.indexOf(val);
    if (idx !== -1) stackOrder.splice(idx, 1);
    if (stackOrder.length === 0) { currentIndex = 0; updateCounter(); }
    else {
        const newIdx = Math.min(currentIndex, stackOrder.length - 1);
        stackOrder.forEach((v, i) => { stacks[v]?.classList.toggle("visible-stack", i === newIdx); });
        currentIndex = newIdx;
        updateCounter();
    }
}

// ── SEEDED DAILY PICKER ───────────────────────────────────────────────────────
function mulberry32(seed) {
    return function() {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
}

function hashStr(str) {
    let h = 5381;
    for (let i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
    return h >>> 0;
}

function dailySeed(val) {
    const d = new Date();
    const ds = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
    return hashStr(ds + val);
}

function seededShuffle(arr, rng) {
    const a = arr.slice();
    for (let i = a.length-1; i > 0; i--) {
        const j = Math.floor(rng() * (i+1));
        [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
}

function pickDailyIndices(val, total, n) {
    if (total <= n) {
        const rng = mulberry32(dailySeed(val));
        return seededShuffle([...Array(total).keys()], rng).slice(0, total);
    }
    const rng = mulberry32(dailySeed(val));
    const shuffled = seededShuffle([...Array(total).keys()], rng);
    const pagesInCycle = Math.floor(total / n);
    const remainder    = total % n;
    const now = new Date();
    const start = new Date(now.getFullYear(), 0, 0);
    const dayOfYear = Math.floor((now - start) / 86400000);
    const page = dayOfYear % pagesInCycle;
    let indices = shuffled.slice(page*n, page*n+n);
    if (indices.length < n && remainder > 0) {
        indices = indices.concat(shuffled.slice(pagesInCycle*n)).slice(0, n);
    }
    return indices;
}

// ── GENERATE ──────────────────────────────────────────────────────────────────
const WORD_ROW_TYPES = new Set(["word-problems","spell-the-word","simple-equations",
    "units-length","units-weight","units-liquid","units-time","units-money"]);

const NUM_MAP = {
    "word-problems":4, "spell-the-word":3, "simple-equations":2,
    "general-knowledge":4,
    "units-length":2,"units-weight":2,"units-liquid":2,"units-time":2,"units-money":2
};

function generate(box, val) {
    box.innerHTML = "";
    const opt = options.find(o=>o[0]===val);
    if (opt) {
        box.innerHTML = `<div class="problem-title">${opt[1]}</div>`;
    }

    // tell-time: GitHub API image listing
    if (val === "tell-time") {
        fetch("https://api.github.com/repos/nerdysrisha/vidyarambha/contents/clocks")
            .then(res=>res.json())
            .then(files=>{
                const pngs = Array.isArray(files) ? files.filter(f=>f.name.endsWith(".png")) : [];
                if (!pngs.length) { box.innerHTML += `<div style="color:#aaa;padding:20px;">No clock images found.</div>`; return; }
                const idx = pickDailyIndices("tell-time", pngs.length, 2);
                const letters = ["a","b"];
                const container = document.createElement("div");
                container.style.cssText = "display:flex;gap:60px;flex-wrap:wrap;padding:12px 0;";
                idx.map(i=>pngs[i]).forEach((file,i)=>{
                    const parts = file.name.replace(".png","").split("-");
                    const timeStr = parts.length >= 3 ? `${parts[1]}:${parts[2]}` : "?";
                    const block = document.createElement("div");
                    block.style.cssText = "display:flex;flex-direction:column;align-items:center;gap:10px;";
                    const lbl = document.createElement("span");
                    lbl.textContent = `(${letters[i]})`; lbl.style.cssText = "font-size:22px;color:#aaa;font-weight:bold;";
                    const img = document.createElement("img");
                    img.src = file.download_url; img.style.cssText = "width:220px;height:220px;border-radius:8px;";
                    const debugLbl = document.createElement("div");
                    debugLbl.style.cssText = "font-size:12px;color:#888;text-align:center;max-width:220px;";
                    debugLbl.textContent = `${file.name} → ${timeStr}`;
                    const ansRow = document.createElement("div");
                    ansRow.style.cssText = "display:flex;align-items:center;gap:10px;font-size:24px;";
                    const ansLabel = document.createElement("span"); ansLabel.textContent="Time:"; ansLabel.style.cssText="color:#aaa;font-size:20px;";
                    const input = document.createElement("input"); input.type="text"; input.className="answer-input"; input.style.width="120px"; input.placeholder="h:mm";
                    const ansSpan = document.createElement("span"); ansSpan.className="answer"; ansSpan.textContent=timeStr;
                    ansRow.appendChild(ansLabel); ansRow.appendChild(input); ansRow.appendChild(ansSpan);
                    block.appendChild(lbl); block.appendChild(img); block.appendChild(debugLbl); block.appendChild(ansRow);
                    container.appendChild(block);
                });
                box.appendChild(container);
            })
            .catch(err=>{ box.innerHTML += `<div style="color:#f66;padding:20px;">Error: ${err.message}</div>`; });
        return;
    }

    // geometric-shapes: GitHub API image listing
    if (val === "geometric-shapes" || val === "drawing-shapes") {
        fetch("https://api.github.com/repos/nerdysrisha/vidyarambha/contents/geometric-shapes")
            .then(res=>res.json())
            .then(files=>{
                const pngs = files.filter(f=>f.name.endsWith(".png"));
                const idx = pickDailyIndices(val, pngs.length, 4);
                const picked = idx.map(i=>pngs[i]);
                const letters = ["a","b","c","d"];
                if (val === "geometric-shapes") {
                    const container = document.createElement("div");
                    container.style.cssText = "display:flex;gap:40px;flex-wrap:wrap;padding:8px 0;";
                    picked.forEach((file,i)=>{
                        const block = document.createElement("div");
                        block.style.cssText = "display:flex;flex-direction:column;align-items:center;gap:8px;";
                        const img = document.createElement("img"); img.src=file.download_url; img.style.cssText="width:160px;height:160px;";
                        const lbl = document.createElement("span"); lbl.textContent=`(${letters[i]})`; lbl.style.cssText="font-size:20px;color:#aaa;";
                        const ansRow = document.createElement("div"); ansRow.style.cssText="display:flex;align-items:center;gap:8px;font-size:22px;";
                        ansRow.innerHTML = `<input type="text" class="answer-input" style="width:130px;" /><span class="answer">${file.name.replace(".png","")}</span>`;
                        block.appendChild(img); block.appendChild(lbl); block.appendChild(ansRow);
                        container.appendChild(block);
                    });
                    box.appendChild(container);
                } else {
                    picked.forEach((file,i)=>{
                        const row = document.createElement("div"); row.className="question-row";
                        row.innerHTML = `<span class="question-letter">(${letters[i]})</span><span class="question-text">${file.name.replace(".png","")}</span>
                            <img src="${file.download_url}" style="width:180px;height:180px;display:none;margin-left:16px;" />
                            <span class="inline-answer-wrap"><span class="answer">${file.name.replace(".png","")}</span></span>`;
                        box.appendChild(row);
                    });
                }
            }).catch(err=>{ box.innerHTML += `<div style="color:#f66;padding:20px;">Error: ${err.message}</div>`; });
        return;
    }

    // draw-clock: special canvas rendering
    if (val === "draw-clock") {
        fetch(BASE_URL + "draw-clock.json")
            .then(r=>{ if(!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
            .then(d=>{
                const total = d.questions.length;
                const idx   = pickDailyIndices("draw-clock", total, 2);
                idx.forEach((qi,j)=>{
                    const letter = String.fromCharCode(97+j);
                    let qText = String(d.questions[qi]??"").replace(/\t\(Q\d+\)$/,"").trim();
                    // extract time from question text
                    const timeMatch = qText.match(/(\d{1,2}:\d{2})/);
                    const time = timeMatch ? timeMatch[1] : "12:00";
                    const row = document.createElement("div");
                    row.className = "question-row";
                    row.style.cssText = "align-items:center;gap:20px;padding:12px 0 12px 20px;flex-wrap:wrap;";
                    row.innerHTML = `<span class="question-letter">(${letter})</span>
                        <span class="question-text" style="font-size:44px;font-weight:bold;">${time}</span>
                        <span style="color:#aaa;font-size:22px;">← Draw this on paper</span>`;
                    const canvas = document.createElement("canvas");
                    canvas.className="clock-answer"; canvas.width=180; canvas.height=180;
                    canvas.dataset.time=time; canvas.style.cssText="display:none;border-radius:50%;margin-left:20px;";
                    row.appendChild(canvas);
                    box.appendChild(row);
                });
            }).catch(err=>{ box.innerHTML+=`<div style="color:#f66;padding:12px;">⚠️ ${err.message}</div>`; });
        return;
    }

    // All other types: fetch from GitHub
    const numQuestions = NUM_MAP[val] || 2;
    fetch(BASE_URL + val + ".json")
        .then(r=>{ if(!r.ok) throw new Error(`HTTP ${r.status} for ${val}.json`); return r.json(); })
        .then(d=>{
            if (!d.questions||!d.answers) throw new Error(`Invalid JSON in ${val}.json`);
            const total = d.questions.length;
            const idx   = pickDailyIndices(val, total, numQuestions);
            idx.forEach((qi,j)=>{
                const letter = String.fromCharCode(97+j);
                let qText = String(d.questions[qi]??"").replace(/\t\(Q\d+\)$/,"").trim();
                const rawAnswer  = String(d.answers[qi]??"");
                const qCodeMatch = rawAnswer.match(/\(Q\d+\)$/);
                const qCode      = qCodeMatch ? qCodeMatch[0] : "";
                const aText      = rawAnswer.replace(/\s*\(Q\d+\)$/,"").trim();
                const aDisplay   = qCode ? `${aText} <span style="color:#555;font-size:0.7em;margin-left:6px;">${qCode}</span>` : aText;

                // number-names: add hidden word span
                if (val === "number-names") {
                    const numMatch = qText.match(/\d+/);
                    if (numMatch) {
                        const word = numberToWords(parseInt(numMatch[0]));
                        qText = qText + ` <span class="num-word">${word}</span>`;
                    }
                }

                let dataType = null;
                if (val === "bodmas")             dataType = "bodmas";
                else if (MISSING_TYPES.has(val))  dataType = "missing";
                else if (val === "missing-number" || val === "pattern-completion") dataType = "sequence";

                if (val === "bodmas") {
                    qText = qText.replace(/([+\-×÷*/x])/gi," $1 ").replace(/\s+/g," ");
                    qText = `<span style="font-size:1.3em;letter-spacing:0.12em;">${qText}</span>`;
                }

                if (WORD_ROW_TYPES.has(val)) {
                    box.innerHTML += renderWordRow(letter, qText, aDisplay);
                } else {
                    box.innerHTML += renderInlineRow(letter, qText, aDisplay, dataType);
                }
            });
        })
        .catch(err=>{
            box.innerHTML += `<div style="color:#f66;padding:12px;font-size:18px;">⚠️ ${err.message}</div>`;
        });
}

// ── CONTROL TOGGLE ────────────────────────────────────────────────────────────
const controlContainer = document.getElementById("control-container");

// ── TIMER ─────────────────────────────────────────────────────────────────────
let timer = null, seconds = 0;
const timerBtn     = document.getElementById("timerBtn");
const resetTimer   = document.getElementById("resetTimer");
const timerDisplay = document.getElementById("timerDisplay");

function updateTimerDisplay() {
    timerDisplay.textContent = `${String(Math.floor(seconds/60)).padStart(2,"0")}:${String(seconds%60).padStart(2,"0")}`;
}

timerBtn.onclick = () => {
    if (!timer) {
        timer = setInterval(()=>{seconds++;updateTimerDisplay();},1000);
        timerBtn.textContent="Pause"; timerBtn.style.background="#cc3300"; timerBtn.style.boxShadow="0 0 12px rgba(204,51,0,0.8)";
    } else {
        clearInterval(timer); timer=null;
        timerBtn.textContent="Start Timer"; timerBtn.style.background="#28a745"; timerBtn.style.boxShadow="0 0 8px rgba(40,167,69,0.5)";
    }
};

resetTimer.onclick = () => {
    clearInterval(timer); timer=null; seconds=0; updateTimerDisplay();
    timerBtn.textContent="Start Timer"; timerBtn.style.background="#28a745"; timerBtn.style.boxShadow="0 0 8px rgba(40,167,69,0.5)";
};

// ── CONFETTI ──────────────────────────────────────────────────────────────────
const CONFETTI_COLORS = ["#ff004c","#ff9900","#ffee00","#28a745","#00c8ff","#cc44ff","#ff66aa","#ffffff"];

function launchConfetti() {
    const count=38, half=Math.floor(count/2), vpW=window.innerWidth;
    for (let i=0;i<count;i++) {
        const piece=document.createElement("div"); piece.className="confetti-piece";
        const isLeft=i<half;
        const originX=isLeft?rand(0,60):rand(vpW-60,vpW-4);
        const spreadX=isLeft?rand(-10,90):rand(-90,10);
        const duration=rand(700,1300), delay=rand(0,220), size=rand(7,13);
        const color=CONFETTI_COLORS[rand(0,CONFETTI_COLORS.length-1)];
        const isCircle=rand(0,1)===0;
        piece.style.cssText=`left:${originX+spreadX}px;top:${rand(-30,40)}px;width:${size}px;height:${size*rand(1,2)}px;background:${color};border-radius:${isCircle?"50%":"2px"};animation-duration:${duration}ms;animation-delay:${delay}ms;`;
        document.body.appendChild(piece);
        setTimeout(()=>piece.remove(), duration+delay+100);
    }
}

// ── ANIMAL RUN ────────────────────────────────────────────────────────────────
const ANIMALS = ["🐢","🐇","🦁","🐘","🦊","🐸","🐧","🦄","🐯","🦋"];
let lastAnimalIdx = -1;

function runAnimal(direction) {
    let idx;
    do { idx=Math.floor(Math.random()*ANIMALS.length); } while (idx===lastAnimalIdx);
    lastAnimalIdx = idx;
    const el=document.createElement("div"); el.className="animal-runner";
    el.textContent=ANIMALS[idx];
    const duration=rand(6800,9800);
    el.style.animationName=direction==="next"?"animalRunRight":"animalRunLeft";
    el.style.animationDuration=`${duration}ms`;
    el.style.animationTimingFunction="linear";
    el.style.animationFillMode="forwards";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), duration+100);
}

// ── CAROUSEL NAVIGATION ───────────────────────────────────────────────────────
const stackOrder   = [];
let   currentIndex = 0;
let   isAnimating  = false;

function updateCounter() {
    const total = stackOrder.length;
    document.getElementById("bottom-qCounter").textContent = total===0 ? "0 / 0" : `${currentIndex+1} / ${total}`;
}

function navigateTo(newIdx, direction) {
    if (stackOrder.length===0) { updateCounter(); return; }
    if (isAnimating) return;
    if (newIdx===currentIndex && stackOrder.length>1) { updateCounter(); return; }
    isAnimating = true;
    const oldEl = stacks[stackOrder[currentIndex]];
    const newEl = stacks[stackOrder[newIdx]];
    currentIndex = newIdx;
    if (oldEl && oldEl!==newEl) {
        oldEl.style.transition="transform 0.38s ease,opacity 0.38s ease";
        oldEl.style.transform=direction==="next"?"translateX(-100%)":"translateX(100%)";
        oldEl.style.opacity="0";
        setTimeout(()=>{
            oldEl.classList.remove("visible-stack");
            oldEl.style.transform=""; oldEl.style.opacity=""; oldEl.style.transition="";
        }, 390);
    }
    if (newEl) {
        newEl.style.transition="none";
        newEl.style.transform=direction==="next"?"translateX(100%)":"translateX(-100%)";
        newEl.style.opacity="0";
        newEl.classList.add("visible-stack");
        newEl.scrollTop=0;
        requestAnimationFrame(()=>{
            requestAnimationFrame(()=>{
                newEl.style.transition="transform 0.38s ease,opacity 0.38s ease";
                newEl.style.transform="translateX(0)";
                newEl.style.opacity="1";
                setTimeout(()=>{ newEl.style.transition=""; newEl.style.transform=""; newEl.style.opacity=""; isAnimating=false; }, 400);
            });
        });
    }
    updateCounter();
}

function navigate(direction) {
    if (stackOrder.length===0) return;
    const idx = direction==="next"
        ? (currentIndex+1) % stackOrder.length
        : (currentIndex-1+stackOrder.length) % stackOrder.length;
    navigateTo(idx, direction);
    launchConfetti();
    runAnimal(direction);
}

document.getElementById("prevBtn").onclick  = () => navigate("prev");
document.getElementById("nextBtn").onclick  = () => navigate("next");
document.getElementById("goTopBtn").onclick = () => { navigateTo(0,"prev"); launchConfetti(); runAnimal("prev"); };

// ── KEYBOARD ARROW KEYS ───────────────────────────────────────────────────────
document.addEventListener("keydown", e => {
    if (e.target.tagName === "INPUT") return; // don't hijack typing
    if (e.key === "ArrowRight") { e.preventDefault(); navigate("next"); }
    if (e.key === "ArrowLeft")  { e.preventDefault(); navigate("prev"); }
});

// ── SELECT ALL ────────────────────────────────────────────────────────────────
const allCheckboxes = Array.from(control.querySelectorAll("input[type='checkbox']"));
document.getElementById("selectAllBtn").onclick = async () => {
    for (let cb of allCheckboxes) {
        if (!cb.checked) {
            cb.checked = true;
            cb.onchange();
            await new Promise(r => setTimeout(r, 500));
        }
    }
};

// ── CLICK ON QUESTION BLOCK ───────────────────────────────────────────────────
questions.addEventListener("click", e => {
    const stack = e.target.closest(".stack-wrapper");
    if (!stack) return;
    launchConfetti();
});

// ── SCREEN WAKE LOCK ──────────────────────────────────────────────────────────
let wakeLock = null;
async function requestWakeLock() {
    try {
        if ("wakeLock" in navigator) {
            wakeLock = await navigator.wakeLock.request("screen");
            wakeLock.addEventListener("release", ()=>{});
        }
    } catch(err) {}
}
document.addEventListener("visibilitychange", ()=>{
    if (wakeLock!==null && document.visibilityState==="visible") requestWakeLock();
});
requestWakeLock();
