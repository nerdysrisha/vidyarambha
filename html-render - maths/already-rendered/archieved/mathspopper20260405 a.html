<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Math Popper</title>
<!--v64 Animated clock -->
<style>
html, body {
    margin: 0;
    height: 100%;
    background: #0a0a0a;
    color: white;
    font-family: Arial, sans-serif;
}

#outer {
    margin: 20px;
    margin-bottom: 0;
    height: calc(100vh - 40px - 64px);
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow: hidden;
}

/* CONTROL PANEL */
#control {
    position: sticky;
    top: 0;
    z-index: 10;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px 16px;
    background: #0a0a0a;
    border: 1px solid #444;
    padding: 16px;
}

#control legend { padding: 0 10px; font-size: 18px; color: #aaa; }

.ctrl-item {
    display: flex;
    align-items: center;
    gap: 12px;
    white-space: nowrap;
    font-size: 20px;
    padding: 6px 0;
    color: #28a745;
}

/* Universe colour */
.ctrl-item.universe-main { color: #a78bfa; }
.ctrl-item.shapes-main    { color: #34d399; }

.ctrl-item input[type="checkbox"] { width: 22px; height: 22px; }

/* CONTROL PANEL WRAPPER */
#control-container {
    display: flex;
    flex-direction: column;
    transition: flex-basis 0.3s ease, min-height 0.3s ease;
    min-height: 40px;
    overflow: hidden;
}

#control-container.shrink {
    flex-basis: auto;
    min-height: 64px;
    padding: 4px 8px;
    border: 1px solid #333;
    border-radius: 8px;
    background: linear-gradient(135deg, #111 0%, #1a1a2e 100%);
}

#control-container.shrink #control { display: none; }

/* TOP BAR */
#control-top-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    min-height: 52px;
}

#control-top-bar label, #control-top-bar span { font-size: 16px; }

/* BUTTONS */
button {
    padding: 8px 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    font-weight: bold;
    transition: transform 0.15s ease, filter 0.15s ease, box-shadow 0.15s ease;
}

button:hover  { transform: scale(1.06); filter: brightness(1.2); }
button:active { transform: scale(0.97); }

#selectAllBtn, #toggleAll {
    background: #28a745;
    color: #fff;
    box-shadow: 0 0 8px rgba(40,167,69,0.5);
}
#selectAllBtn:hover, #toggleAll:hover { box-shadow: 0 0 16px rgba(40,167,69,0.9); }

.nav-btn {
    background: #0077cc;
    color: #fff;
    font-weight: bold;
    box-shadow: 0 0 8px rgba(0,119,204,0.5);
}
.nav-btn:hover { background: #0099ff; box-shadow: 0 0 16px rgba(0,153,255,0.9); }

#timerBtn { background: #28a745; color: #fff; box-shadow: 0 0 8px rgba(40,167,69,0.5); }
#resetTimer { background: #555; color: #fff; }
#timerDisplay {
    font-size: 18px;
    font-weight: bold;
    color: #00c8ff;
    min-width: 56px;
    letter-spacing: 2px;
}

#dateBox {
    font-size: 14px;
    font-weight: bold;
    color: #28a745;
    background: #0d1a0d;
    border: 1px solid #28a745;
    border-radius: 6px;
    padding: 4px 10px;
    letter-spacing: 0.5px;
    white-space: nowrap;
}

/* QUESTIONS PANEL */
#questions {
    position: relative;
    overflow: hidden;
    border: 1px solid #333;
    border-radius: 8px;
    flex: 1;
    min-height: 0;
    padding: 8px;
    box-sizing: border-box;
}

#questions legend { padding: 0 10px; font-size: 16px; color: #aaa; }

.stack-wrapper {
    display: none;
    position: absolute;
    top: 8px; left: 8px; right: 8px; bottom: 8px;
    overflow: hidden;
    box-sizing: border-box;
}

.stack-wrapper.visible-stack {
    display: block;
    position: absolute;
    overflow-y: auto;
    overflow-x: hidden;
}

.stack-wrapper::-webkit-scrollbar { width: 10px; }
.stack-wrapper::-webkit-scrollbar-track { background: #111; }
.stack-wrapper::-webkit-scrollbar-thumb { background-color: #555; border-radius: 6px; border: 2px solid #111; }
.stack-wrapper::-webkit-scrollbar-thumb:hover { background-color: #888; }

.stack-wrapper.auto-size { height: auto; min-height: 100%; }

.stack-box {
    border: 1px solid #2a2a2a;
    border-left: 4px solid #28a745;
    border-radius: 6px;
    background: #111;
    padding: 16px 20px;
    box-sizing: border-box;
    width: 100%;
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
}

.stack-box.auto-size { height: auto; }

/* Universe box colour variants */
.stack-box.box-guess    { border-left-color: #f59e0b; background: linear-gradient(160deg,#1a1200,#111); }
.stack-box.box-science  { border-left-color: #34d399; background: linear-gradient(160deg,#001a0d,#111); }
.stack-box.box-geo      { border-left-color: #60a5fa; background: linear-gradient(160deg,#00101a,#111); }
.stack-box.box-machines { border-left-color: #f472b6; background: linear-gradient(160deg,#1a0010,#111); }

/* TITLES */
.problem-title {
    color: #28a745;
    font-weight: bold;
    margin-bottom: 8px;
    font-size: 24px;
}

.title-guess    { color: #f59e0b; }
.title-science  { color: #34d399; }
.title-geo      { color: #60a5fa; }
.title-machines { color: #f472b6; }

/* QUESTION ROWS */
.question-row {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    font-size: 40px;
    line-height: 2;
    padding: 4px 0 4px 20px;
    border-bottom: 1px solid #1e1e1e;
}

.question-letter {
    width: 60px;
    text-align: right;
    margin-right: 20px;
    font-weight: bold;
    flex-shrink: 0;
}

.question-text { flex: 1; min-width: 0; }

.question-row.word-row {
    flex-direction: column;
    align-items: flex-start;
    padding-bottom: 12px;
}

.question-row.word-row .word-top {
    display: flex;
    align-items: baseline;
    width: 100%;
}

.question-row.word-row .word-answer-line {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 8px;
    padding-left: 80px;
    font-size: 30px;
}

.inline-answer-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-left: 16px;
    flex-shrink: 0;
}

.answer {
    visibility: hidden;
    color: #58D68D;
    font-weight: bold;
}

.answer.show { visibility: visible; }

.answer-input {
    width: 110px;
    height: 36px;
    background: #000;
    color: #fff;
    border: 1px solid #444;
    border-radius: 6px;
    text-align: center;
    font-size: 22px;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

.answer-input:focus {
    border-color: #00c8ff;
    box-shadow: 0 0 8px rgba(0,200,255,0.6);
}

.num-word {
    visibility: hidden;
    color: #58D68D;
    font-weight: bold;
    font-size: 0.65em;
    margin-left: 16px;
}

.working-block {
    display: none;
    width: 100%;
    box-sizing: border-box;
    margin: 0;
    padding: 10px 14px 10px 80px;
    background: #0d1a0d;
    border-left: 3px solid #28a745;
    border-top: 1px solid #1a2e1a;
    border-radius: 0 0 4px 4px;
    font-size: 17px;
    color: #aaa;
    line-height: 1.9;
}

.working-block.show { display: block; }
.working-block .w-step   { color: #58D68D; font-weight: bold; }
.working-block .w-label  { color: #ff9900; font-size: 0.8em; margin-right: 6px; }
.working-block .w-result { color: #00c8ff; font-weight: bold; }

/* ── COLUMN ARITHMETIC (subtract-borrow, multiply-carry) ───────────── */
.col-work {
    display: inline-flex;
    flex-direction: column;
    align-items: flex-end;
    font-family: 'Courier New', monospace;
    font-size: 22px;
    background: #0a120a;
    border: 1px solid #1e3a1e;
    border-radius: 8px;
    padding: 10px 18px 10px 14px;
    margin: 6px 0 4px 0;
    gap: 1px;
    min-width: 120px;
}

/* A single row inside .col-work */
.col-row {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 0;
    position: relative;
    white-space: nowrap;
}

/* The operator prefix (−, ×) on the left of the second number */
.col-op {
    color: #ff9900;
    font-weight: bold;
    margin-right: 4px;
    min-width: 18px;
    text-align: right;
}

/* Digits in column layout */
.col-digit {
    display: inline-block;
    width: 28px;
    text-align: center;
    color: #eee;
}

/* Borrow annotation sits above a digit */
.col-digit-wrap {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    width: 28px;
}

.col-borrow {
    font-size: 11px;
    color: #f472b6;
    font-weight: bold;
    height: 14px;
    line-height: 14px;
}

.col-carry {
    font-size: 11px;
    color: #60a5fa;
    font-weight: bold;
    height: 14px;
    line-height: 14px;
}

/* Divider line between operands and result */
.col-line {
    width: 100%;
    border: none;
    border-top: 2px solid #28a745;
    margin: 4px 0;
}

/* Result row digits */
.col-result-digit {
    display: inline-block;
    width: 28px;
    text-align: center;
    color: #58D68D;
    font-weight: bold;
}

/* Partial product rows in multiplication */
.col-partial {
    color: #a78bfa;
}

/* Step-by-step annotation lines below the column work */
.col-annotation {
    font-size: 14px;
    color: #777;
    font-family: Arial, sans-serif;
    margin-top: 4px;
    line-height: 1.8;
}
.col-annotation .ca-col   { color: #ff9900; font-weight: bold; }
.col-annotation .ca-borrow{ color: #f472b6; font-weight: bold; }
.col-annotation .ca-carry { color: #60a5fa; font-weight: bold; }
.col-annotation .ca-ans   { color: #58D68D; font-weight: bold; }

/* ── UNIVERSE MCQ: 30/70 two-panel layout ────────────────────────────── */
.univ-block {
    border-bottom: 1px solid #1e1e1e;
    padding: 16px 0 20px 0;
}

/* Two-column layout: 30% left, 70% right */
.univ-block-inner {
    display: flex;
    align-items: stretch;
    gap: 0;
    min-height: 420px;
}

/* Left column: 30% — question + stacked options + answer badge */
.univ-left-col {
    flex: 0 0 30%;
    width: 30%;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 12px 16px 12px 20px;
    border-right: 1px solid #2a2a2a;
    box-sizing: border-box;
}

/* Right column: 70% — image panel */
.univ-right-col {
    flex: 0 0 70%;
    width: 70%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px 20px;
    box-sizing: border-box;
    gap: 10px;
    background: rgba(0,0,0,0.2);
    border-radius: 0 8px 8px 0;
}

.univ-q-header {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 6px;
}

.univ-q-header-top {
    display: flex;
    align-items: center;
    gap: 10px;
}

.univ-q-letter {
    font-size: 22px;
    font-weight: bold;
    flex-shrink: 0;
}

.univ-q-category {
    font-size: 11px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-radius: 4px;
    padding: 2px 8px;
    flex-shrink: 0;
}

.univ-q-text {
    font-size: 20px;
    line-height: 1.4;
    color: #eee;
}

/* Options: stacked vertically, full width */
.univ-options {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 4px;
}

.univ-option {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #181828;
    border: 1px solid #2a2a3e;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 18px;
    width: 100%;
    box-sizing: border-box;
}

.univ-option-letter {
    font-size: 15px;
    font-weight: bold;
    width: 20px;
    flex-shrink: 0;
}

.univ-option-text { color: #ccc; }

/* Answer row */
.univ-answer-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 10px;
    flex-wrap: wrap;
}

.univ-badge {
    visibility: hidden;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(88,214,141,0.12);
    border: 1px solid #58D68D;
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 18px;
    font-weight: bold;
    color: #58D68D;
}

.univ-badge.show { visibility: visible; }

/* Q1 question image — large, always visible, fills right col */
.univ-q-image {
    display: block;
    width: 100%;
    max-width: 560px;
    height: 380px;
    object-fit: contain;
    border-radius: 16px;
    border: 2px solid #f59e0b;
    background: #0a0a0a;
    box-shadow: 0 0 32px rgba(245,158,11,0.35), 0 4px 20px rgba(0,0,0,0.7);
}

/* Answer images for Q2-Q4: large, hidden until Show */
.univ-ans-img {
    display: none;
    width: 100%;
    max-width: 560px;
    height: 380px;
    object-fit: contain;
    border-radius: 16px;
    background: #0a0a0a;
}

.univ-ans-img.show { display: block; }

/* Per-type border + glow for answer images */
.guess-img    { border: 2px solid #f59e0b; box-shadow: 0 0 28px rgba(245,158,11,0.35), 0 4px 20px rgba(0,0,0,0.6); }
.science-img  { border: 2px solid #34d399; box-shadow: 0 0 28px rgba(52,211,153,0.35), 0 4px 20px rgba(0,0,0,0.6); }
.geo-img      { border: 2px solid #60a5fa; box-shadow: 0 0 28px rgba(96,165,250,0.35), 0 4px 20px rgba(0,0,0,0.6); }
.machines-img { border: 2px solid #f472b6; box-shadow: 0 0 28px rgba(244,114,182,0.35), 0 4px 20px rgba(0,0,0,0.6); }

/* Placeholder shown in right column before answer reveal */
.univ-img-placeholder {
    width: 100%;
    max-width: 560px;
    height: 380px;
    border-radius: 16px;
    background: #111;
    border: 2px dashed #2a2a2a;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #2a2a2a;
    font-size: 60px;
    flex-shrink: 0;
}

.univ-img-placeholder.hide { display: none; }

.univ-img-404 {
    display: none;
    font-size: 13px;
    color: #555;
    font-style: italic;
}
.univ-img-404.show { display: inline; }

/* Colour helpers */
.c-guess    { color: #f59e0b; }
.c-science  { color: #34d399; }
.c-geo      { color: #60a5fa; }
.c-machines { color: #f472b6; }

.cat-guess    { color: #f59e0b; background: rgba(245,158,11,0.10); border: 1px solid rgba(245,158,11,0.3); }
.cat-science  { color: #34d399; background: rgba(52,211,153,0.10); border: 1px solid rgba(52,211,153,0.3); }
.cat-geo      { color: #60a5fa; background: rgba(96,165,250,0.10); border: 1px solid rgba(96,165,250,0.3); }
.cat-machines { color: #f472b6; background: rgba(244,114,182,0.10); border: 1px solid rgba(244,114,182,0.3); }
/* ────────────────────────────────────────────────────────────────────── */

/* BOTTOM NAV */
#bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 8px 20px;
    background: #0f0f0f;
    border-top: 1px solid #333;
    z-index: 100;
    box-sizing: border-box;
}

#bottom-nav button { padding: 12px 32px; font-size: 18px; border-radius: 12px; }

#bottom-qCounter {
    font-size: 20px;
    font-weight: bold;
    color: #00c8ff;
    min-width: 80px;
    text-align: center;
    letter-spacing: 2px;
}

/* CONFETTI */
@keyframes confettiFall {
    0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(420px) rotate(720deg) scale(0.4); opacity: 0; }
}

.confetti-piece {
    position: fixed;
    width: 10px; height: 10px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 9999;
    animation: confettiFall linear forwards;
}

/* ANIMAL RUN */
@keyframes animalRunRight {
    0%   { transform: translateX(-120px) scaleX(1); }
    100% { transform: translateX(calc(100vw + 120px)) scaleX(1); }
}
@keyframes animalRunLeft {
    0%   { transform: translateX(calc(100vw + 120px)) scaleX(-1); }
    100% { transform: translateX(-120px) scaleX(-1); }
}

.animal-runner {
    position: fixed;
    bottom: 72px;
    font-size: 52px;
    pointer-events: none;
    z-index: 9998;
    line-height: 1;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
}

/* RAINBOW GLOW */
@keyframes answersBlink {
    0%,100% { opacity:1; }
    50%     { opacity:0.45; }
}

@keyframes rainbowGlow {
    0%   { outline-color: #ff004c; }
    20%  { outline-color: #ff9900; }
    40%  { outline-color: #ffee00; }
    60%  { outline-color: #28a745; }
    80%  { outline-color: #00c8ff; }
    100% { outline-color: #ff004c; }
}

.stack-wrapper.visible-stack::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    border: 3px solid transparent;
    animation: rainbowGlow 4s linear infinite;
    z-index: 0;
}
</style>
</head>
<body>

<div id="outer">
    <div id="control-container" class="shrink">
        <div id="control-top-bar" style="margin:4px 8px;">
            <button id="selectAllBtn">All Qs</button>
            <label style="display:flex;align-items:center;gap:8px;font-size:16px;">
                <input type="checkbox" id="control-toggle" />
                Show Control Panel
            </label>
            <button id="toggleAll">Show</button>
            <span id="answersShownBadge" style="display:none;font-size:14px;font-weight:bold;color:#ff4444;background:#1a0000;border:1px solid #ff4444;border-radius:6px;padding:4px 12px;letter-spacing:0.5px;animation:answersBlink 2s ease-in-out infinite;">&#128274; ANSWERS SHOWN</span>
            <button id="timerBtn">Start Timer</button>
            <button id="resetTimer">Reset</button>
            <span id="timerDisplay">00:00</span>
            <button id="goTopBtn" class="nav-btn">&#11014; Top Q</button>
            <span id="dateBox"></span>
        </div>
        <fieldset id="control">
            <legend>Control Panel</legend>
        </fieldset>
    </div>

    <fieldset id="questions">
        <legend>Questions Panel</legend>
    </fieldset>
</div>

<div id="bottom-nav">
    <button id="prevBtn" class="nav-btn">&#8592; Prev</button>
    <span id="bottom-qCounter">0 / 0</span>
    <button id="nextBtn" class="nav-btn">Next &#8594;</button>
</div>

<script>
const BASE_URL          = "https://raw.githubusercontent.com/nerdysrisha/vidyarambha/refs/heads/main/maths/questions/";
const UNIVERSE_IMG_BASE = "https://raw.githubusercontent.com/nerdysrisha/vidyarambha/refs/heads/main/universe/";

// ── UNIVERSE CONFIG ───────────────────────────────────────────────────────────
const UNIVERSE_SOURCES = [
    {
        file:       "universe-guess-image.json",
        showQImage: true,
        accent:     "#f59e0b",
        catClass:   "cat-guess",
        imgClass:   "guess-img",
        cClass:     "c-guess"
    },
    {
        file:       "universe-science.json",
        showQImage: false,
        accent:     "#34d399",
        catClass:   "cat-science",
        imgClass:   "science-img",
        cClass:     "c-science"
    },
    {
        file:       "universe-geography.json",
        showQImage: false,
        accent:     "#60a5fa",
        catClass:   "cat-geo",
        imgClass:   "geo-img",
        cClass:     "c-geo"
    },
    {
        file:       "universe-machines.json",
        showQImage: false,
        accent:     "#f472b6",
        catClass:   "cat-machines",
        imgClass:   "machines-img",
        cClass:     "c-machines"
    }
];

// ── FIX 1: Date/time box — use JS string concatenation, NOT HTML entities ─────
function updateDateBox() {
    const now = new Date();
    const days   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const d = days[now.getDay()] + " " + now.getDate() + " " + months[now.getMonth()] + " " + now.getFullYear();
    const h = String(now.getHours()).padStart(2,"0");
    const m = String(now.getMinutes()).padStart(2,"0");
    const s = String(now.getSeconds()).padStart(2,"0");
    document.getElementById("dateBox").textContent = "\uD83D\uDCC5 " + d + "  \uD83D\uDD54 " + h + ":" + m + ":" + s;
}
updateDateBox();
setInterval(updateDateBox, 1000);

const options = [
    ["number-names",         "1. Number Names"],
    ["ascending-order",      "2. Ascending Order"],
    ["descending-order",     "3. Descending Order"],
    ["neg-pos-numbers",      "4. +ve/-ve Numbers"],
    ["word-problems",        "5. Word Problems"],
    ["addend-left-missing",  "6. Find Left Addend"],

function numberToWords(n) {
    const ones = ["","one","two","three","four","five","six","seven","eight","nine",
                  "ten","eleven","twelve","thirteen","fourteen","fifteen","sixteen",
                  "seventeen","eighteen","nineteen"];
    const tens = ["","","twenty","thirty","forty","fifty","sixty","seventy","eighty","ninety"];
    if (n === 0) return "zero";
    if (n < 20)  return ones[n];
    if (n < 100) return tens[Math.floor(n/10)] + (n%10 ? " "+ones[n%10] : "");
    if (n < 1000) {
        const r = n % 100;
        return ones[Math.floor(n/100)] + " hundred" + (r ? " "+numberToWords(r) : "");
    }
    const r = n % 1000;
    return numberToWords(Math.floor(n/1000)) + " thousand" + (r ? " "+numberToWords(r) : "");
}

// ── BODMAS STEP-BY-STEP ───────────────────────────────────────────────────────
function bodmasSteps(expr) {
    let e = expr.replace(/🧠\s*/,"").replace(/\s*\(Q\d+\)/,"").trim();
    e = e.replace(/×/g,"*").replace(/÷/g,"/").replace(/&#215;/g,"*").replace(/&#247;/g,"/").replace(/x/gi,"*");
    const steps = [];
    let cur = e, prev, iter;
    prev = cur; iter = 0;
    while (/\(/.test(cur) && iter++ < 20) {
        cur = cur.replace(/\(([^()]+)\)/g, (_,inner) => { try { return String(eval(inner)); } catch(e) { return _; } });
        if (cur !== prev) steps.push({label:"Brackets", expr:cur});
        prev = cur;
    }
    prev = cur; iter = 0;
    while (/[\d.]+\s*[*/]\s*[\d.]+/.test(cur) && iter++ < 20) {
        cur = cur.replace(/([\d.]+)\s*([*/])\s*([\d.]+)/, (_,a,op,b) => {
            const v = op==="*" ? parseFloat(a)*parseFloat(b) : parseFloat(a)/parseFloat(b);
            return String(Number.isInteger(v)?v:parseFloat(v.toFixed(4)));
        });
        if (cur !== prev) steps.push({label:"× ÷", expr:cur});
        prev = cur;
    }
    prev = cur; iter = 0;
    while (/([\d.]+)\s*([+\-])\s*([\d.]+)/.test(cur) && iter++ < 20) {
        cur = cur.replace(/([\d.]+)\s*([+\-])\s*([\d.]+)/, (_,a,op,b) => {
            const v = op==="+" ? parseFloat(a)+parseFloat(b) : parseFloat(a)-parseFloat(b);
            return String(Number.isInteger(v)?v:parseFloat(v.toFixed(4)));
        });
        if (cur !== prev) steps.push({label:"+ −", expr:cur});
        prev = cur;
    }
    steps.push({label:"Answer", expr:'<span class="w-result">' + cur.replace(/\*/g,"×").replace(/\//g,"÷") + '</span>'});
    return steps;
}

function missingWorking(qText) {
    const clean = qText
        .replace(/🔍\s*/,"").replace(/&#128269;\s*/,"")
        .replace(/\s*\(Q\d+\)/,"")
        .replace(/\s*=\s*/," = ")
        .trim();
    let m;
    if ((m = clean.match(/^__\s*\+\s*([\d.]+)\s*=\s*([\d.]+)/)))
        return ['<span class="w-label">Reverse:</span> ' + m[2] + ' − ' + m[1] + ' = <span class="w-step">' + (parseFloat(m[2])-parseFloat(m[1])) + '</span>'];
    if ((m = clean.match(/^([\d.]+)\s*\+\s*__\s*=\s*([\d.]+)/)))
        return ['<span class="w-label">Reverse:</span> ' + m[2] + ' − ' + m[1] + ' = <span class="w-step">' + (parseFloat(m[2])-parseFloat(m[1])) + '</span>'];
    if ((m = clean.match(/^__\s*[-−]\s*([\d.]+)\s*=\s*([\d.]+)/)))
        return ['<span class="w-label">Reverse:</span> ' + m[2] + ' + ' + m[1] + ' = <span class="w-step">' + (parseFloat(m[2])+parseFloat(m[1])) + '</span>'];
    if ((m = clean.match(/^([\d.]+)\s*[-−]\s*__\s*=\s*([\d.]+)/)))
        return ['<span class="w-label">Reverse:</span> ' + m[1] + ' − ' + m[2] + ' = <span class="w-step">' + (parseFloat(m[1])-parseFloat(m[2])) + '</span>'];
    if ((m = clean.match(/^__\s*[×x\*]\s*([\d.]+)\s*=\s*([\d.]+)/i)))
        return ['<span class="w-label">Reverse:</span> ' + m[2] + ' ÷ ' + m[1] + ' = <span class="w-step">' + (parseFloat(m[2])/parseFloat(m[1])) + '</span>'];
    if ((m = clean.match(/^([\d.]+)\s*[×x\*]\s*__\s*=\s*([\d.]+)/i)))
        return ['<span class="w-label">Reverse:</span> ' + m[2] + ' ÷ ' + m[1] + ' = <span class="w-step">' + (parseFloat(m[2])/parseFloat(m[1])) + '</span>'];
    if ((m = clean.match(/^__\s*[÷\/]\s*([\d.]+)\s*=\s*([\d.]+)/)))
        return ['<span class="w-label">Reverse:</span> ' + m[2] + ' × ' + m[1] + ' = <span class="w-step">' + (parseFloat(m[2])*parseFloat(m[1])) + '</span>'];
    if ((m = clean.match(/^([\d.]+)\s*[÷\/]\s*__\s*=\s*([\d.]+)/)))
        return ['<span class="w-label">Reverse:</span> ' + m[1] + ' ÷ ' + m[2] + ' = <span class="w-step">' + (parseFloat(m[1])/parseFloat(m[2])) + '</span>'];
    return [];
}

function sequenceWorking(qText) {
    const clean = qText.replace(/🔍\s*/,"").replace(/&#128269;\s*/,"").replace(/\s*\(Q\d+\)/,"").trim();
    const parts = clean.split(",").map(s=>s.trim());
    const nums  = parts.map(p => p==="__" ? null : parseFloat(p));
    const known = nums.filter(n=>n!==null);
    if (known.length < 2) return [];
    const diffs = [];
    for (let i=1;i<known.length;i++) diffs.push(known[i]-known[i-1]);
    const allSame = diffs.every(d=>d===diffs[0]);
    if (allSame) return ['<span class="w-label">Pattern:</span> each number ' + (diffs[0]>=0?"+":"") + diffs[0]];
    return ['<span class="w-label">Look at the pattern carefully</span>'];
}

// ── SUBTRACT WITH BORROW ──────────────────────────────────────────────────────
function subtractBorrowWorking(qText) {
    const clean = qText.replace(/\s*\(Q\d+\)/,"").trim();
    const m = clean.match(/([\d,]+)\s*[-\u2212]\s*([\d,]+)/);
    if (!m) return "";
    const A = parseInt(m[1].replace(/,/g,""), 10);
    const B = parseInt(m[2].replace(/,/g,""), 10);
    if (isNaN(A) || isNaN(B) || A < B) return "";

    const aD = String(A).split("").map(Number);
    const bD = String(B).split("").map(Number);
    const len = Math.max(aD.length, bD.length);
    while (aD.length < len) aD.unshift(0);
    while (bD.length < len) bD.unshift(0);

    const work   = aD.slice();
    const sup    = new Array(len).fill(null);
    const result = new Array(len);
    const colNames = ["ones","tens","hundreds","thousands","ten-thousands"];
    const annotations = [];

    for (let i = len - 1; i >= 0; i--) {
        const colName = colNames[len - 1 - i] || ("col-" + (len - i));
        let top = work[i];
        const bot = bD[i];

        if (top < bot) {
            let j = i - 1;
            while (j >= 0 && work[j] === 0) {
                work[j] = 9;
                sup[j]  = 9;
                j--;
            }
            if (j >= 0) {
                work[j]--;
                sup[j] = work[j];
            }
            top += 10;
            work[i] = top;
            sup[i]  = top;

            annotations.push(
                '<span class="ca-col">' + colName + ':</span> '
                + 'borrow \u2192 <span class="ca-borrow">' + top + '</span>'
                + ' \u2212 ' + bot
                + ' = <span class="ca-ans">' + (top - bot) + '</span>'
            );
        } else {
            annotations.push(
                '<span class="ca-col">' + colName + ':</span> '
                + top + ' \u2212 ' + bot
                + ' = <span class="ca-ans">' + (top - bot) + '</span>'
            );
        }
        result[i] = top - bot;
    }

    const topHTML = aD.map((origD, i) => {
        const supVal = sup[i];
        const supStr = (supVal !== null) ? String(supVal) : '\u00a0';
        const digStr = (supVal !== null)
            ? '<span style="text-decoration:line-through;color:#555;">' + origD + '</span>'
            : String(origD);
        return (
            '<span class="col-digit-wrap">' +
                '<span class="col-borrow">' + supStr + '</span>' +
                '<span class="col-digit">' + digStr + '</span>' +
            '</span>'
        );
    }).join("");

    const botHTML = bD.map(d =>
        '<span class="col-digit">' + d + '</span>'
    ).join("");

    const resHTML = result.map((d, i) => {
        if (i === 0 && d === 0 && result.length > 1)
            return '<span class="col-result-digit">\u00a0</span>';
        return '<span class="col-result-digit">' + d + '</span>';
    }).join("");

    return (
        '<div class="col-work">' +
            '<div class="col-row">' + topHTML + '</div>' +
            '<div class="col-row"><span class="col-op">\u2212</span>' + botHTML + '</div>' +
            '<hr class="col-line">' +
            '<div class="col-row">' + resHTML + '</div>' +
        '</div>' +
        '<div class="col-annotation">' +
            annotations.map(a => '<div>' + a + '</div>').join("") +
        '</div>'
    );
}


// ── MULTIPLY WITH CARRY ───────────────────────────────────────────────────────
function multiplyCarryWorking(qText) {
    const clean = qText.replace(/\s*\(Q\d+\)/,"").trim();
    const m = clean.match(/([\d,]+)\s*[×x\*]\s*([\d,]+)/i);
    if (!m) return "";
    const A = parseInt(m[1].replace(/,/g,""), 10);
    const B = parseInt(m[2].replace(/,/g,""), 10);
    if (isNaN(A) || isNaN(B)) return "";

    const aDigits = String(A).split("").map(Number);
    const bDigits = String(B).split("").map(Number);
    const colNames = ["ones","tens","hundreds","thousands","ten-thousands"];

    const partials = [];
    const annotations = [];

    for (let bi = bDigits.length - 1; bi >= 0; bi--) {
        const bDig   = bDigits[bi];
        const shift  = bDigits.length - 1 - bi;
        const bColName = colNames[shift] || ("col-" + (shift+1));
        let carry    = 0;
        const rowDigs = [];
        annotations.push('<span class="ca-col">× ' + bDig + ' (' + bColName + ' digit):</span>');

        for (let ai = aDigits.length - 1; ai >= 0; ai--) {
            const prod = aDigits[ai] * bDig + carry;
            carry = Math.floor(prod / 10);
            const digit = prod % 10;
            rowDigs.unshift(digit);
            const aColName = colNames[aDigits.length - 1 - ai] || ("col-" + (aDigits.length - ai));
            if (carry > 0 || bDig > 1) {
                annotations.push(
                    '&nbsp;&nbsp;' + aColName + ': ' + aDigits[ai] + '×' + bDig +
                    (carry > 0 && prod >= 10 ? ' + carry ' + Math.floor((prod - digit)/10) : '') +
                    ' = <span class="ca-ans">' + prod + '</span>' +
                    (carry > 0 ? ' → write <span class="ca-ans">' + digit + '</span>, carry <span class="ca-carry">' + carry + '</span>' : '')
                );
            }
        }
        if (carry > 0) rowDigs.unshift(carry);
        for (let s = 0; s < shift; s++) rowDigs.push(0);
        partials.push(rowDigs);
    }

    const result = A * B;
    const resultDigs = String(result).split("").map(Number);

    const maxLen = Math.max(aDigits.length, bDigits.length, ...partials.map(p=>p.length), resultDigs.length);

    function padLeft(arr, len) {
        const out = arr.slice();
        while (out.length < len) out.unshift(null);
        return out;
    }

    function rowHTML(digits, cls, op) {
        const padded = padLeft(digits, maxLen);
        const cells = padded.map((d,i) => {
            if (d === null) return '<span class="' + cls + '">&nbsp;</span>';
            return '<span class="' + cls + '">' + d + '</span>';
        }).join("");
        const opSpan = op ? '<span class="col-op">' + op + '</span>' : '<span class="col-op">&nbsp;</span>';
        return '<div class="col-row">' + opSpan + cells + '</div>';
    }

    let html = '<div class="col-work">';
    html += rowHTML(aDigits, "col-digit", "");
    html += rowHTML(bDigits, "col-digit", "×");

    if (partials.length === 1) {
        html += '<hr class="col-line">';
        html += rowHTML(resultDigs, "col-result-digit", "");
    } else {
        html += '<hr class="col-line">';
        partials.forEach((p, i) => {
            html += rowHTML(p, "col-digit col-partial", i === 0 ? "" : "+");
        });
        html += '<hr class="col-line">';
        html += rowHTML(resultDigs, "col-result-digit", "");
    }

    html += '</div>';
    html += '<div class="col-annotation">' +
        annotations.map(a => '<div>' + a + '</div>').join("") +
        '<div><span class="ca-col">Final answer:</span> <span class="ca-ans">' + result + '</span></div>' +
    '</div>';

    return html;
}

// ── DRAW CLOCK ────────────────────────────────────────────────────────────────
// Draws the static clock face (tick marks + numbers) — reused by animation loop
function drawClockFace(ctx, cx, cy, r, size) {
    ctx.clearRect(0, 0, size, size);
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, 2*Math.PI);
    ctx.fillStyle = "#1a1a2e"; ctx.fill();
    ctx.strokeStyle = "#00c8ff"; ctx.lineWidth = 3; ctx.stroke();
    for (let m = 0; m < 60; m++) {
        const angle   = (m / 30) * Math.PI - Math.PI/2;
        const isHour  = m % 5  === 0;
        const isQuart = m % 15 === 0;
        const innerR  = isQuart ? r*0.78 : isHour ? r*0.82 : r*0.89;
        ctx.beginPath();
        ctx.moveTo(cx + innerR*Math.cos(angle), cy + innerR*Math.sin(angle));
        ctx.lineTo(cx + r*0.97*Math.cos(angle), cy + r*0.97*Math.sin(angle));
        ctx.strokeStyle = isQuart ? "#dddddd" : isHour ? "#888888" : "#4a4a4a";
        ctx.lineWidth   = isQuart ? 3 : isHour ? 2 : 1;
        ctx.stroke();
    }
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillStyle = "#ffffff"; ctx.font = "bold " + (size*0.09) + "px Arial";
    for (let h = 1; h <= 12; h++) {
        const angle = (h/6)*Math.PI - Math.PI/2;
        const nr = r * 0.68;
        ctx.fillText(h, cx + nr*Math.cos(angle), cy + nr*Math.sin(angle));
    }
}

// Draws hands at a given progress (0 = both at 12, 1 = target time)
function drawClockAt(canvas, targetMinFrac, targetHourFrac, progress) {
    const size = canvas.width, cx = size/2, cy = size/2, r = size/2 - 6;
    const ctx  = canvas.getContext("2d");
    drawClockFace(ctx, cx, cy, r, size);

    // Ease-out cubic for smooth deceleration
    const t = 1 - Math.pow(1 - progress, 3);

    // Minute hand: sweeps clockwise from 0 to targetMinFrac full turns
    const minFrac  = targetMinFrac * t;
    const minAngle = minFrac * 2 * Math.PI - Math.PI/2;
    ctx.beginPath(); ctx.moveTo(cx, cy);
    ctx.lineTo(cx + r*0.80*Math.cos(minAngle), cy + r*0.80*Math.sin(minAngle));
    ctx.strokeStyle = "#58D68D"; ctx.lineWidth = size*0.020; ctx.lineCap = "round"; ctx.stroke();

    // Hour hand: sweeps from 0 to targetHourFrac of a full turn
    const hourFrac  = targetHourFrac * t;
    const hourAngle = hourFrac * 2 * Math.PI - Math.PI/2;
    ctx.beginPath(); ctx.moveTo(cx, cy);
    ctx.lineTo(cx + r*0.50*Math.cos(hourAngle), cy + r*0.50*Math.sin(hourAngle));
    ctx.strokeStyle = "#ff9900"; ctx.lineWidth = size*0.038; ctx.lineCap = "round"; ctx.stroke();

    // Centre dot
    ctx.beginPath(); ctx.arc(cx, cy, size*0.03, 0, 2*Math.PI);
    ctx.fillStyle = "#ffffff"; ctx.fill();
}

// Animated entry — hands sweep from 12 to target over ~900 ms
function animateClock(canvas, timeStr) {
    const parts   = timeStr.split(":").map(Number);
    const hours   = parts[0] % 12;
    const minutes = parts[1] || 0;
    // Fraction of full circle for each hand (starting at 12 = 0)
    const targetMinFrac  = minutes / 60;
    const targetHourFrac = (hours + minutes / 60) / 12;

    const DURATION = 900; // ms
    const startTime = performance.now();

    // Cancel any previous animation on this canvas
    if (canvas._clockRaf) cancelAnimationFrame(canvas._clockRaf);

    function step(now) {
        const progress = Math.min((now - startTime) / DURATION, 1);
        drawClockAt(canvas, targetMinFrac, targetHourFrac, progress);
        if (progress < 1) {
            canvas._clockRaf = requestAnimationFrame(step);
        } else {
            canvas._clockRaf = null;
        }
    }
    canvas._clockRaf = requestAnimationFrame(step);
}

// Keep drawClock as a static (non-animated) fallback used by identify-time
function drawClock(canvas, timeStr) {
    const parts   = timeStr.split(":").map(Number);
    const hours   = parts[0] % 12;
    const minutes = parts[1] || 0;
    drawClockAt(canvas, minutes/60, (hours + minutes/60)/12, 1);
}

    document.querySelectorAll("canvas.clock-answer").forEach(canvas => {
        if (showAll) { canvas.style.display="block"; animateClock(canvas, canvas.dataset.time); }

            canvas.style.display="none";
            canvas.getContext("2d").clearRect(0,0,canvas.width,canvas.height);
        }
    });
    document.querySelectorAll(".working-block").forEach(wb => wb.classList.toggle("show", showAll));

    document.querySelectorAll(".univ-badge").forEach(b => b.classList.toggle("show", showAll));

    document.querySelectorAll(".univ-img-404").forEach(el => {
        if (showAll && el.dataset.haserror === "1") el.classList.add("show");
        else el.classList.remove("show");
    });

    if (showAll) {
        document.querySelectorAll(".question-row[data-type='bodmas']").forEach(row => {
            if (row.querySelector(".working-block")) return;
            const qSpan = row.querySelector(".question-text");
            if (!qSpan) return;
            const steps = bodmasSteps(qSpan.innerText||"");
            if (!steps.length) return;
            const wb = document.createElement("div");
            wb.className = "working-block show";
            const displayExpr = e => e.replace(/\*/g,"×").replace(/\//g,"÷");
            wb.innerHTML = steps.map((s,i) => '<div><span class="w-label">Step ' + (i+1) + ' (' + s.label + '):</span> ' + (s.expr.includes("w-result")?s.expr:displayExpr(s.expr)) + '</div>').join("");
            row.appendChild(wb);
        });
        document.querySelectorAll(".question-row[data-type='missing']").forEach(row => {
            if (row.querySelector(".working-block")) return;
            const qSpan = row.querySelector(".question-text");
            if (!qSpan) return;
            const lines = missingWorking(qSpan.innerText||"");
            if (!lines.length) return;
            const wb = document.createElement("div");
            wb.className = "working-block show";
            wb.innerHTML = lines.map(l=>"<div>"+l+"</div>").join("");
            row.appendChild(wb);
        });
        document.querySelectorAll(".question-row[data-type='sequence']").forEach(row => {
            if (row.querySelector(".working-block")) return;
            const qSpan = row.querySelector(".question-text");
            if (!qSpan) return;
            const lines = sequenceWorking(qSpan.innerText||"");
            if (!lines.length) return;
            const wb = document.createElement("div");
            wb.className = "working-block show";
            wb.innerHTML = lines.map(l=>"<div>"+l+"</div>").join("");
            row.appendChild(wb);
        });
        document.querySelectorAll(".question-row[data-type='subtract-borrow']").forEach(row => {
            if (row.querySelector(".working-block")) return;
            const qSpan = row.querySelector(".question-text");
            if (!qSpan) return;
            const html = subtractBorrowWorking(qSpan.innerText||"");
            if (!html) return;
            const wb = document.createElement("div");
            wb.className = "working-block show";
            wb.innerHTML = html;
            row.appendChild(wb);
        });
        document.querySelectorAll(".question-row[data-type='multiply-carry']").forEach(row => {
            if (row.querySelector(".working-block")) return;
            const qSpan = row.querySelector(".question-text");
            if (!qSpan) return;
            const html = multiplyCarryWorking(qSpan.innerText||"");
            if (!html) return;
            const wb = document.createElement("div");
            wb.className = "working-block show";
            wb.innerHTML = html;
            row.appendChild(wb);
        });
    }
    toggleAll.textContent = showAll ? "Hide Answers" : "Show";
    toggleAll.style.background = showAll ? "#cc3300" : "#28a745";
    toggleAll.style.boxShadow  = showAll ? "0 0 12px rgba(204,51,0,0.7)" : "0 0 8px rgba(40,167,69,0.5)";
};

// ── STACK MANAGEMENT ──────────────────────────────────────────────────────────
const AUTO_SIZE = new Set(["word-problems","bodmas","simple-equations",
    "units-length","units-weight","units-liquid","units-time","units-money",
    "spell-the-word","general-knowledge","missing-number","pattern-completion",
    "true-or-false","neg-pos-numbers","ascending-order","descending-order",
    "number-names","draw-clock","identify-time","universe","shapes-draw","shapes-identify"]);

function addStack(val) {
    if (stacks[val]) return;
    const wrapper = document.createElement("div");
    wrapper.className = "stack-wrapper" + (AUTO_SIZE.has(val) ? " auto-size" : "");
    const isUniverse = val === "universe";
    const box = document.createElement("div");
    box.className = "stack-box" + (isUniverse ? " box-guess" : "");
    wrapper.appendChild(box);
    stacks[val] = wrapper;
    stackOrder.push(val);
    questions.appendChild(wrapper);
    generate(box, val);
    navigateTo(stackOrder.length - 1, "next");
}

function removeStack(val) {
    stacks[val]?.remove();
    delete stacks[val];
    const idx = stackOrder.indexOf(val);
    if (idx !== -1) stackOrder.splice(idx, 1);
    if (stackOrder.length === 0) { currentIndex = 0; updateCounter(); }
    else {
        const newIdx = Math.min(currentIndex, stackOrder.length - 1);
        stackOrder.forEach((v, i) => { stacks[v]?.classList.toggle("visible-stack", i === newIdx); });
        currentIndex = newIdx;
        updateCounter();
    }
}

// ── SEEDED DAILY PICKER ───────────────────────────────────────────────────────
function mulberry32(seed) {
    return function() {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
}

function hashStr(str) {
    let h = 5381;
    for (let i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
    return h >>> 0;
}

function dailySeed(val) {
    const d = new Date();
    const ds = "" + d.getFullYear() + String(d.getMonth()+1).padStart(2,"0") + String(d.getDate()).padStart(2,"0");
    return hashStr(ds + val);
}

function seededShuffle(arr, rng) {
    const a = arr.slice();
    for (let i = a.length-1; i > 0; i--) {
        const j = Math.floor(rng() * (i+1));
        [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
}

function pickDailyIndices(val, total, n) {
    if (total <= n) {
        const rng = mulberry32(dailySeed(val));
        return seededShuffle([...Array(total).keys()], rng).slice(0, total);
    }
    const rng = mulberry32(dailySeed(val));
    const shuffled = seededShuffle([...Array(total).keys()], rng);
    const pagesInCycle = Math.floor(total / n);
    const remainder    = total % n;
    const now = new Date();
    const start = new Date(now.getFullYear(), 0, 0);
    const dayOfYear = Math.floor((now - start) / 86400000);
    const page = dayOfYear % pagesInCycle;
    let indices = shuffled.slice(page*n, page*n+n);
    if (indices.length < n && remainder > 0) {
        indices = indices.concat(shuffled.slice(pagesInCycle*n)).slice(0, n);
    }
    return indices;
}

// ── UNIVERSE GENERATOR ────────────────────────────────────────────────────────
async function generateUniverse(box) {
    box.innerHTML = '<div class="problem-title" style="background:linear-gradient(90deg,#f59e0b,#34d399,#60a5fa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">34. Universe</div>' +
        '<div style="color:#555;font-size:15px;padding:4px 0 16px 0;">Loading questions from across the universe...</div>';

    const results = await Promise.all(
        UNIVERSE_SOURCES.map((src, si) =>
            fetch(BASE_URL + src.file)
                .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
                .then(data => ({ src, data, si }))
                .catch(err => ({ src, data: null, err, si }))
        )
    );

    box.innerHTML = '<div class="problem-title" style="background:linear-gradient(90deg,#f59e0b,#34d399,#60a5fa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-size:24px;font-weight:bold;margin-bottom:8px;">34. Universe</div>';

    let letterIdx = 0;
    results.forEach(({ src, data, err, si }) => {
        if (!data || !data.questions || data.questions.length === 0) {
            box.innerHTML += '<div style="color:#f66;padding:8px 20px;">Could not load ' + src.file + '</div>';
            return;
        }
        const [qi] = pickDailyIndices(src.file, data.questions.length, 1);
        const q    = data.questions[qi];
        if (!q) return;
        const letter  = String.fromCharCode(97 + letterIdx);
        const isFirst = (si === 0);
        box.innerHTML += renderUniverseQuestion(letter, q, src, isFirst);
        letterIdx++;
    });

    if (letterIdx === 0) {
        box.innerHTML += '<div style="color:#f66;padding:20px;">No questions loaded.</div>';
    }

    if (showAll) {
        box.querySelectorAll(".univ-badge").forEach(b => b.classList.add("show"));
        box.querySelectorAll(".univ-ans-img").forEach(img => img.classList.add("show"));
        box.querySelectorAll(".univ-img-placeholder").forEach(ph => ph.classList.add("hide"));
    }
}

const WORD_ROW_TYPES = new Set(["word-problems","spell-the-word","simple-equations",

const NUM_MAP = {

    "general-knowledge":4,

function generate(box, val) {

    box.innerHTML = "";

                    const ansRow = document.createElement("div");
                    ansRow.style.cssText = "display:flex;align-items:center;gap:10px;font-size:24px;";
                    const ansLabel = document.createElement("span"); ansLabel.textContent = "Time:"; ansLabel.style.cssText = "color:#aaa;font-size:20px;";

                    const ansSpan = document.createElement("span"); ansSpan.className = "answer"; ansSpan.textContent = timeStr;
                    ansRow.appendChild(ansLabel); ansRow.appendChild(input); ansRow.appendChild(ansSpan);
                    block.appendChild(lbl); block.appendChild(canvas); block.appendChild(ansRow);
                    container.appendChild(block);
                });
                box.appendChild(container);
            })
            .catch(err => { box.innerHTML += '<div style="color:#f66;padding:20px;">' + err.message + '</div>'; });
        return;
    }


    // ── SHAPES-DRAW & SHAPES-IDENTIFY ─────────────────────────────────────────
    if (val === "shapes-draw" || val === "shapes-identify") {
        const SHAPES_DATA = [
            { name:"circle",        type:"2d" }, { name:"oval",          type:"2d" },
            { name:"semicircle",    type:"2d" }, { name:"square",        type:"2d" },
            { name:"rectangle",     type:"2d" }, { name:"triangle",      type:"2d" },
            { name:"pentagon",      type:"2d" }, { name:"hexagon",       type:"2d" },
            { name:"heptagon",      type:"2d" }, { name:"octagon",       type:"2d" },
            { name:"nonagon",       type:"2d" }, { name:"decagon",       type:"2d" },
            { name:"parallelogram", type:"2d" }, { name:"rhombus",       type:"2d" },
            { name:"trapezoid",     type:"2d" }, { name:"kite",          type:"2d" },
            { name:"cube",          type:"3d" }, { name:"cuboid",        type:"3d" },
            { name:"sphere",        type:"3d" }, { name:"cylinder",      type:"3d" },
            { name:"cone",          type:"3d" }, { name:"pyramid",       type:"3d" }
        ];

        function drawShape(canvas, name) {
            const W = canvas.width, H = canvas.height;
            const cx = W/2, cy = H/2;
            const ctx = canvas.getContext("2d");
            ctx.clearRect(0,0,W,H);
            const FILL2D="#1a3a5c", STROKE2D="#00c8ff";
            const FILL3D_F="#1a3a2a", FILL3D_T="#0d2a1a", FILL3D_S="#0a1f14", STROKE3D="#34d399";
            function solidPath(pathFn, fill, stroke, lw) {
                ctx.beginPath(); pathFn();
                ctx.fillStyle=fill; ctx.fill();
                ctx.strokeStyle=stroke; ctx.lineWidth=lw||3; ctx.stroke();
            }
            function regularPolygon(n, r) {
                const a0=-Math.PI/2;
                ctx.moveTo(cx+r*Math.cos(a0), cy+r*Math.sin(a0));
                for (let i=1;i<=n;i++) { const a=a0+(2*Math.PI*i/n); ctx.lineTo(cx+r*Math.cos(a), cy+r*Math.sin(a)); }
                ctx.closePath();
            }
            const R=Math.min(W,H)*0.38;
            switch(name) {
                case "circle":        solidPath(()=>{ ctx.arc(cx,cy,R,0,2*Math.PI); }, FILL2D, STROKE2D); break;
                case "oval":          solidPath(()=>{ ctx.ellipse(cx,cy,R,R*0.6,0,0,2*Math.PI); }, FILL2D, STROKE2D); break;
                case "semicircle":    solidPath(()=>{ ctx.arc(cx,cy+R*0.2,R,Math.PI,0); ctx.lineTo(cx-R,cy+R*0.2); ctx.closePath(); }, FILL2D, STROKE2D); break;
                case "square":        { const s=R*1.35; solidPath(()=>{ ctx.rect(cx-s/2,cy-s/2,s,s); }, FILL2D, STROKE2D); break; }
                case "rectangle":     { const rw=R*1.7,rh=R*1.0; solidPath(()=>{ ctx.rect(cx-rw/2,cy-rh/2,rw,rh); }, FILL2D, STROKE2D); break; }
                case "triangle":      solidPath(()=>{ ctx.moveTo(cx,cy-R); ctx.lineTo(cx+R*0.95,cy+R*0.7); ctx.lineTo(cx-R*0.95,cy+R*0.7); ctx.closePath(); }, FILL2D, STROKE2D); break;
                case "parallelogram": solidPath(()=>{ const sk=R*0.4,w=R*1.4,h=R*0.8; ctx.moveTo(cx-w/2+sk,cy-h/2); ctx.lineTo(cx+w/2+sk,cy-h/2); ctx.lineTo(cx+w/2-sk,cy+h/2); ctx.lineTo(cx-w/2-sk,cy+h/2); ctx.closePath(); }, FILL2D, STROKE2D); break;
                case "rhombus":       solidPath(()=>{ ctx.moveTo(cx,cy-R); ctx.lineTo(cx+R*0.7,cy); ctx.lineTo(cx,cy+R); ctx.lineTo(cx-R*0.7,cy); ctx.closePath(); }, FILL2D, STROKE2D); break;
                case "trapezoid":     solidPath(()=>{ const tw=R*0.9,bw=R*1.6,h=R*0.85; ctx.moveTo(cx-tw,cy-h/2); ctx.lineTo(cx+tw,cy-h/2); ctx.lineTo(cx+bw,cy+h/2); ctx.lineTo(cx-bw,cy+h/2); ctx.closePath(); }, FILL2D, STROKE2D); break;
                case "kite":          solidPath(()=>{ ctx.moveTo(cx,cy-R); ctx.lineTo(cx+R*0.65,cy); ctx.lineTo(cx,cy+R*0.85); ctx.lineTo(cx-R*0.65,cy); ctx.closePath(); }, FILL2D, STROKE2D); break;
                case "pentagon":      solidPath(()=>regularPolygon(5,R),  FILL2D, STROKE2D); break;
                case "hexagon":       solidPath(()=>regularPolygon(6,R),  FILL2D, STROKE2D); break;
                case "heptagon":      solidPath(()=>regularPolygon(7,R),  FILL2D, STROKE2D); break;
                case "octagon":       solidPath(()=>regularPolygon(8,R),  FILL2D, STROKE2D); break;
                case "nonagon":       solidPath(()=>regularPolygon(9,R),  FILL2D, STROKE2D); break;
                case "decagon":       solidPath(()=>regularPolygon(10,R), FILL2D, STROKE2D); break;
                case "cube": {
                    const s=R*1.1, ex=s*0.55, ey=s*0.32;
                    solidPath(()=>{ ctx.moveTo(cx-s/2,cy-s/2+ey); ctx.lineTo(cx+s/2,cy-s/2+ey); ctx.lineTo(cx+s/2,cy+s/2+ey); ctx.lineTo(cx-s/2,cy+s/2+ey); ctx.closePath(); }, FILL3D_F, STROKE3D);
                    solidPath(()=>{ ctx.moveTo(cx-s/2,cy-s/2+ey); ctx.lineTo(cx-s/2+ex,cy-s/2); ctx.lineTo(cx+s/2+ex,cy-s/2); ctx.lineTo(cx+s/2,cy-s/2+ey); ctx.closePath(); }, FILL3D_T, STROKE3D);
                    solidPath(()=>{ ctx.moveTo(cx+s/2,cy-s/2+ey); ctx.lineTo(cx+s/2+ex,cy-s/2); ctx.lineTo(cx+s/2+ex,cy+s/2); ctx.lineTo(cx+s/2,cy+s/2+ey); ctx.closePath(); }, FILL3D_S, STROKE3D);
                    break;
                }
                case "cuboid": {
                    const w=R*1.5,h=R*0.9,ex=R*0.5,ey=R*0.28;
                    solidPath(()=>{ ctx.moveTo(cx-w/2,cy-h/2+ey); ctx.lineTo(cx+w/2,cy-h/2+ey); ctx.lineTo(cx+w/2,cy+h/2+ey); ctx.lineTo(cx-w/2,cy+h/2+ey); ctx.closePath(); }, FILL3D_F, STROKE3D);
                    solidPath(()=>{ ctx.moveTo(cx-w/2,cy-h/2+ey); ctx.lineTo(cx-w/2+ex,cy-h/2); ctx.lineTo(cx+w/2+ex,cy-h/2); ctx.lineTo(cx+w/2,cy-h/2+ey); ctx.closePath(); }, FILL3D_T, STROKE3D);
                    solidPath(()=>{ ctx.moveTo(cx+w/2,cy-h/2+ey); ctx.lineTo(cx+w/2+ex,cy-h/2); ctx.lineTo(cx+w/2+ex,cy+h/2); ctx.lineTo(cx+w/2,cy+h/2+ey); ctx.closePath(); }, FILL3D_S, STROKE3D);
                    break;
                }
                case "sphere": {
                    const grad=ctx.createRadialGradient(cx-R*0.3,cy-R*0.3,R*0.1,cx,cy,R);
                    grad.addColorStop(0,"#7dd3fc"); grad.addColorStop(0.4,"#1a3a5c"); grad.addColorStop(1,"#0a1520");
                    ctx.beginPath(); ctx.arc(cx,cy,R,0,2*Math.PI); ctx.fillStyle=grad; ctx.fill();
                    ctx.strokeStyle=STROKE2D; ctx.lineWidth=2; ctx.stroke();
                    ctx.beginPath(); ctx.ellipse(cx,cy,R,R*0.28,0,0,2*Math.PI);
                    ctx.strokeStyle="rgba(0,200,255,0.3)"; ctx.lineWidth=1.5; ctx.stroke();
                    break;
                }
                case "cylinder": {
                    const cr=R*0.75,ch=R*1.1,ey2=cr*0.32;
                    solidPath(()=>{ ctx.moveTo(cx-cr,cy-ch/2+ey2); ctx.lineTo(cx+cr,cy-ch/2+ey2); ctx.lineTo(cx+cr,cy+ch/2); ctx.lineTo(cx-cr,cy+ch/2); ctx.closePath(); }, FILL3D_F, STROKE3D);
                    solidPath(()=>{ ctx.ellipse(cx,cy-ch/2+ey2,cr,ey2,0,0,2*Math.PI); }, FILL3D_T, STROKE3D);
                    ctx.beginPath(); ctx.ellipse(cx,cy+ch/2,cr,ey2,0,0,Math.PI);
                    ctx.strokeStyle=STROKE3D; ctx.lineWidth=2; ctx.stroke();
                    break;
                }
                case "cone": {
                    const br=R*0.85,bey=br*0.32,tip=cy-R*1.05;
                    solidPath(()=>{ ctx.moveTo(cx,tip); ctx.lineTo(cx+br,cy+bey); ctx.lineTo(cx-br,cy+bey); ctx.closePath(); }, FILL3D_F, STROKE3D);
                    solidPath(()=>{ ctx.ellipse(cx,cy+bey,br,bey,0,0,2*Math.PI); }, FILL3D_T, STROKE3D);
                    break;
                }
                case "pyramid": {
                    const ps=R*1.1,ex2=ps*0.38,ey3=ps*0.22,tipY=cy-R*0.9;
                    const bl=cx-ps/2,br2=cx+ps/2,bot=cy+ps*0.4;
                    solidPath(()=>{ ctx.moveTo(cx,tipY); ctx.lineTo(bl,bot+ey3); ctx.lineTo(bl+ex2,bot); ctx.closePath(); }, FILL3D_S, STROKE3D);
                    solidPath(()=>{ ctx.moveTo(cx,tipY); ctx.lineTo(br2+ex2,bot); ctx.lineTo(br2,bot+ey3); ctx.closePath(); }, FILL3D_T, STROKE3D);
                    solidPath(()=>{ ctx.moveTo(cx,tipY); ctx.lineTo(bl,bot+ey3); ctx.lineTo(br2,bot+ey3); ctx.closePath(); }, FILL3D_F, STROKE3D);
                    ctx.beginPath(); ctx.moveTo(bl+ex2,bot); ctx.lineTo(br2+ex2,bot); ctx.lineTo(br2,bot+ey3); ctx.lineTo(bl,bot+ey3); ctx.closePath();
                    ctx.fillStyle="#0a1a10"; ctx.fill(); ctx.strokeStyle=STROKE3D; ctx.lineWidth=1.5; ctx.stroke();
                    break;
                }
            }
        }

        window._drawShape = drawShape;

        const idx = pickDailyIndices(val, SHAPES_DATA.length, 4);
        const picked = idx.map(i => SHAPES_DATA[i]);
        const letters = ["a","b","c","d"];
        const SIZE = 180;

        if (val === "shapes-identify") {
            // ── 36. Shapes - Identify: show drawn shape, kid types the name ──────
            // Answer span uses shape.name (was incorrectly shape.label)
            const container = document.createElement("div");
            container.style.cssText = "display:flex;gap:36px;flex-wrap:wrap;padding:8px 0 16px 0;align-items:flex-start;";
            picked.forEach((shape, i) => {
                const block = document.createElement("div");
                block.style.cssText = "display:flex;flex-direction:column;align-items:center;gap:10px;";
                const badge = document.createElement("div");
                badge.style.cssText = "font-size:11px;font-weight:bold;text-transform:uppercase;letter-spacing:1px;padding:2px 8px;border-radius:4px;"
                    + (shape.type==="3d" ? "color:#34d399;background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.3);"
                                        : "color:#60a5fa;background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.3);");
                badge.textContent = shape.type.toUpperCase();
                const canvas = document.createElement("canvas");
                canvas.width = SIZE; canvas.height = SIZE;
                canvas.style.cssText = "border-radius:10px;background:#0d1a0d;border:1px solid #1e3a1e;display:block;";
                setTimeout(() => drawShape(canvas, shape.name), 30);
                const lbl = document.createElement("span");
                lbl.textContent = "(" + letters[i] + ")"; lbl.style.cssText = "font-size:20px;color:#aaa;font-weight:bold;";
                const ansRow = document.createElement("div");
                ansRow.style.cssText = "display:flex;align-items:center;gap:8px;font-size:20px;";
                const inp = document.createElement("input"); inp.type="text"; inp.className="answer-input"; inp.style.width="140px";
                // FIX: use shape.name (capitalised) instead of shape.label (undefined)
                const ans = document.createElement("span"); ans.className="answer"; ans.textContent = capitalise(shape.name);
                ansRow.appendChild(inp); ansRow.appendChild(ans);
                block.appendChild(badge); block.appendChild(canvas); block.appendChild(lbl); block.appendChild(ansRow);
                container.appendChild(block);
            });
            box.appendChild(container);
        } else {
            // ── 35. Shapes - Draw: show shape name, canvas revealed on Show ──────
            // nameSpan now uses shape.name (was incorrectly shape.label)
            picked.forEach((shape, i) => {
                const row = document.createElement("div");
                row.style.cssText = [
                    "display:flex",
                    "align-items:center",
                    "gap:16px",
                    "padding:14px 20px",
                    "border-bottom:1px solid #1e1e1e",
                    "flex-wrap:nowrap",
                    "box-sizing:border-box",
                    "width:100%",
                    "min-height:70px"
                ].join(";");

                const letter = document.createElement("span");
                letter.style.cssText = "font-size:36px;font-weight:bold;color:#fff;flex-shrink:0;width:60px;text-align:right;";
                letter.textContent = "(" + letters[i] + ")";

                const badge = document.createElement("span");
                badge.style.cssText = "font-size:12px;font-weight:bold;text-transform:uppercase;"
                    + "letter-spacing:1px;padding:3px 10px;border-radius:4px;flex-shrink:0;"
                    + (shape.type==="3d"
                        ? "color:#34d399;background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.3);"
                        : "color:#60a5fa;background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.3);");
                badge.textContent = shape.type.toUpperCase();

                // FIX: use shape.name (capitalised) instead of shape.label (undefined)
                const nameSpan = document.createElement("span");
                nameSpan.style.cssText = [
                    "font-size:40px",
                    "font-weight:bold",
                    "color:#ffffff",
                    "flex:1",
                    "min-width:0",
                    "white-space:nowrap",
                    "overflow:hidden",
                    "text-overflow:ellipsis"
                ].join(";");
                nameSpan.textContent = capitalise(shape.name);

                const hint = document.createElement("span");
                hint.style.cssText = "color:#555;font-size:16px;flex-shrink:0;white-space:nowrap;";
                hint.textContent = "\u2190 draw on paper";

                const canvas = document.createElement("canvas");
                canvas.width = SIZE; canvas.height = SIZE;
                canvas.className = "shape-answer-canvas";
                canvas.dataset.shapeName = shape.name;
                canvas.style.cssText = "display:none;border-radius:10px;background:#0d1a0d;"
                    + "border:2px solid #1e3a1e;flex-shrink:0;";

                row.appendChild(letter);
                row.appendChild(badge);
                row.appendChild(nameSpan);
                row.appendChild(hint);
                row.appendChild(canvas);
                box.appendChild(row);
            });
        }
        return;
    }

    if (val === "geometric-shapes" || val === "drawing-shapes") {
        fetch("https://api.github.com/repos/nerdysrisha/vidyarambha/contents/geometric-shapes")
            .then(res=>res.json())
            .then(files=>{
                const pngs = files.filter(f=>f.name.endsWith(".png"));
                const idx = pickDailyIndices(val, pngs.length, 4);
                const picked = idx.map(i=>pngs[i]);
                const letters = ["a","b","c","d"];
                if (val === "geometric-shapes") {
                    const container = document.createElement("div");
                    container.style.cssText = "display:flex;gap:40px;flex-wrap:wrap;padding:8px 0;";
                    picked.forEach((file,i)=>{
                        const block = document.createElement("div");
                        block.style.cssText = "display:flex;flex-direction:column;align-items:center;gap:8px;";
                        const img = document.createElement("img"); img.src=file.download_url; img.style.cssText="width:160px;height:160px;";
                        const lbl = document.createElement("span"); lbl.textContent="(" + letters[i] + ")"; lbl.style.cssText="font-size:20px;color:#aaa;";
                        const ansRow = document.createElement("div"); ansRow.style.cssText="display:flex;align-items:center;gap:8px;font-size:22px;";
                        ansRow.innerHTML = '<input type="text" class="answer-input" style="width:130px;" /><span class="answer">' + file.name.replace(".png","") + '</span>';
                        block.appendChild(img); block.appendChild(lbl); block.appendChild(ansRow);
                        container.appendChild(block);
                    });
                    box.appendChild(container);
                } else {
                    picked.forEach((file,i)=>{
                        const row = document.createElement("div"); row.className="question-row";
                        row.innerHTML = '<span class="question-letter">(' + letters[i] + ')</span><span class="question-text">' + file.name.replace(".png","") + '</span>' +
                            '<img src="' + file.download_url + '" style="width:180px;height:180px;display:none;margin-left:16px;" />' +
                            '<span class="inline-answer-wrap"><span class="answer">' + file.name.replace(".png","") + '</span></span>';
                        box.appendChild(row);
                    });
                }
            }).catch(err=>{ box.innerHTML += '<div style="color:#f66;padding:20px;">Error: ' + err.message + '</div>'; });
        return;
    }

    if (val === "draw-clock") {
        fetch(BASE_URL + "draw-clock.json")
            .then(r=>{ if(!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
            .then(d=>{
                const idx = pickDailyIndices("draw-clock", d.questions.length, 2);
                idx.forEach((qi,j)=>{
                    const letter = String.fromCharCode(97+j);
                    let qText = String(d.questions[qi]??"").replace(/\t\(Q\d+\)$/,"").trim();
                    const timeMatch = qText.match(/(\d{1,2}:\d{2})/);
                    const time = timeMatch ? timeMatch[1] : "12:00";
                    const row = document.createElement("div");
                    row.className = "question-row";
                    row.style.cssText = "align-items:center;gap:20px;padding:12px 0 12px 20px;flex-wrap:wrap;";
                    row.innerHTML = '<span class="question-letter">(' + letter + ')</span>' +
                        '<span class="question-text" style="font-size:44px;font-weight:bold;">' + time + '</span>' +
                        '<span style="color:#aaa;font-size:22px;">Draw this on paper</span>';
                    const canvas = document.createElement("canvas");
                    canvas.className="clock-answer"; canvas.width=180; canvas.height=180;
                    canvas.dataset.time=time; canvas.style.cssText="display:none;border-radius:50%;margin-left:20px;";
                    row.appendChild(canvas);
                    box.appendChild(row);
                });
            }).catch(err=>{ box.innerHTML+='<div style="color:#f66;padding:12px;">' + err.message + '</div>'; });
        return;
    }

    const numQuestions = NUM_MAP[val] || 2;
    fetch(BASE_URL + val + ".json")
        .then(r=>{ if(!r.ok) throw new Error("HTTP " + r.status + " for " + val + ".json"); return r.json(); })
        .then(d=>{
            if (!d.questions||!d.answers) throw new Error("Invalid JSON in " + val + ".json");
            const total = d.questions.length;
            const idx   = pickDailyIndices(val, total, numQuestions);
            idx.forEach((qi,j)=>{
                const letter = String.fromCharCode(97+j);
                let qText = String(d.questions[qi]??"").replace(/\t\(Q\d+\)$/,"").trim();
                const rawAnswer  = String(d.answers[qi]??"");
                const qCodeMatch = rawAnswer.match(/\(Q\d+\)$/);
                const qCode      = qCodeMatch ? qCodeMatch[0] : "";
                const aText      = rawAnswer.replace(/\s*\(Q\d+\)$/,"").trim();
                const aDisplay   = qCode ? aText + ' <span style="color:#555;font-size:0.7em;margin-left:6px;">' + qCode + '</span>' : aText;

                if (val === "number-names") {
                    const numMatch = qText.match(/\d+/);
                    if (numMatch) {
                        const word = numberToWords(parseInt(numMatch[0]));
                        qText = qText + ' <span class="num-word">' + word + '</span>';
                    }
                }

                let dataType = null;
                if (val === "bodmas")                         dataType = "bodmas";
                else if (MISSING_TYPES.has(val))              dataType = "missing";
                else if (val === "missing-number" || val === "pattern-completion") dataType = "sequence";
                else if (val === "subtract-with-borrow")      dataType = "subtract-borrow";
                else if (val === "multiply-2-digit")          dataType = "multiply-carry";

                if (val === "bodmas") {
                    qText = qText.replace(/([+\-×÷*/x])/gi," $1 ").replace(/\s+/g," ");
                    qText = '<span style="font-size:1.3em;letter-spacing:0.12em;">' + qText + '</span>';
                }

                if (WORD_ROW_TYPES.has(val)) {
                    box.innerHTML += renderWordRow(letter, qText, aDisplay);
                } else {
                    box.innerHTML += renderInlineRow(letter, qText, aDisplay, dataType);
                }
            });
        })
        .catch(err=>{
            box.innerHTML += '<div style="color:#f66;padding:12px;font-size:18px;">' + err.message + '</div>';
        });
}

// ── CONTROL TOGGLE ────────────────────────────────────────────────────────────
const controlContainer = document.getElementById("control-container");
const controlToggle    = document.getElementById("control-toggle");
controlToggle.checked  = false;
controlToggle.onchange = () => controlContainer.classList.toggle("shrink", !controlToggle.checked);

// ── TIMER ─────────────────────────────────────────────────────────────────────
let timer = null, seconds = 0;
const timerBtn     = document.getElementById("timerBtn");
const resetTimerBtn= document.getElementById("resetTimer");
const timerDisplay = document.getElementById("timerDisplay");

function updateTimerDisplay() {
    timerDisplay.textContent = String(Math.floor(seconds/60)).padStart(2,"0") + ":" + String(seconds%60).padStart(2,"0");
}

timerBtn.onclick = () => {
    if (!timer) {
        timer = setInterval(()=>{seconds++;updateTimerDisplay();},1000);
        timerBtn.textContent="Pause"; timerBtn.style.background="#cc3300"; timerBtn.style.boxShadow="0 0 12px rgba(204,51,0,0.8)";
    } else {
        clearInterval(timer); timer=null;
        timerBtn.textContent="Start Timer"; timerBtn.style.background="#28a745"; timerBtn.style.boxShadow="0 0 8px rgba(40,167,69,0.5)";
    }
};

resetTimerBtn.onclick = () => {
    clearInterval(timer); timer=null; seconds=0; updateTimerDisplay();
    timerBtn.textContent="Start Timer"; timerBtn.style.background="#28a745"; timerBtn.style.boxShadow="0 0 8px rgba(40,167,69,0.5)";
};

// ── CONFETTI ──────────────────────────────────────────────────────────────────
const CONFETTI_COLORS = ["#ff004c","#ff9900","#ffee00","#28a745","#00c8ff","#cc44ff","#ff66aa","#ffffff"];

function launchConfetti() {
    const count=38, half=Math.floor(count/2), vpW=window.innerWidth;
    for (let i=0;i<count;i++) {
        const piece=document.createElement("div"); piece.className="confetti-piece";
        const isLeft=i<half;
        const originX=isLeft?rand(0,60):rand(vpW-60,vpW-4);
        const spreadX=isLeft?rand(-10,90):rand(-90,10);
        const duration=rand(700,1300), delay=rand(0,220), size=rand(7,13);
        const color=CONFETTI_COLORS[rand(0,CONFETTI_COLORS.length-1)];
        const isCircle=rand(0,1)===0;
        piece.style.cssText="left:"+(originX+spreadX)+"px;top:"+rand(-30,40)+"px;width:"+size+"px;height:"+(size*rand(1,2))+"px;background:"+color+";border-radius:"+(isCircle?"50%":"2px")+";animation-duration:"+duration+"ms;animation-delay:"+delay+"ms;";
        document.body.appendChild(piece);
        setTimeout(()=>piece.remove(), duration+delay+100);
    }
}

// ── ANIMAL RUN ────────────────────────────────────────────────────────────────
const ANIMALS = ["\uD83D\uDC22","\uD83D\uDC07","\uD83E\uDD81","\uD83D\uDC18","\uD83E\uDD92","\uD83D\uDC38","\uD83D\uDC27","\uD83E\uDD94","\uD83D\uDC2F","\uD83E\uDD93"];
let lastAnimalIdx = -1;

function runAnimal(direction) {
    let idx;
    do { idx=Math.floor(Math.random()*ANIMALS.length); } while (idx===lastAnimalIdx);
    lastAnimalIdx = idx;
    const el=document.createElement("div"); el.className="animal-runner";
    el.textContent=ANIMALS[idx];
    const duration=rand(6800,9800);
    el.style.animationName=direction==="next"?"animalRunRight":"animalRunLeft";
    el.style.animationDuration=duration+"ms";
    el.style.animationTimingFunction="linear";
    el.style.animationFillMode="forwards";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), duration+100);
}

// ── CAROUSEL NAVIGATION ───────────────────────────────────────────────────────
const stackOrder   = [];
let   currentIndex = 0;
let   isAnimating  = false;

function updateCounter() {
    const total = stackOrder.length;
    document.getElementById("bottom-qCounter").textContent = total===0 ? "0 / 0" : (currentIndex+1) + " / " + total;
}

function navigateTo(newIdx, direction) {
    if (stackOrder.length===0) { updateCounter(); return; }
    if (isAnimating) return;
    if (newIdx===currentIndex && stackOrder.length>1) { updateCounter(); return; }
    isAnimating = true;
    const oldEl = stacks[stackOrder[currentIndex]];
    const newEl = stacks[stackOrder[newIdx]];
    currentIndex = newIdx;
    if (oldEl && oldEl!==newEl) {
        oldEl.style.transition="transform 0.38s ease,opacity 0.38s ease";
        oldEl.style.transform=direction==="next"?"translateX(-100%)":"translateX(100%)";
        oldEl.style.opacity="0";
        setTimeout(()=>{
            oldEl.classList.remove("visible-stack");
            oldEl.style.transform=""; oldEl.style.opacity=""; oldEl.style.transition="";
        }, 390);
    }
    if (newEl) {
        newEl.style.transition="none";
        newEl.style.transform=direction==="next"?"translateX(100%)":"translateX(-100%)";
        newEl.style.opacity="0";
        newEl.classList.add("visible-stack");
        newEl.scrollTop=0;
        requestAnimationFrame(()=>{
            requestAnimationFrame(()=>{
                newEl.style.transition="transform 0.38s ease,opacity 0.38s ease";
                newEl.style.transform="translateX(0)";
                newEl.style.opacity="1";
                setTimeout(()=>{ newEl.style.transition=""; newEl.style.transform=""; newEl.style.opacity=""; isAnimating=false; }, 400);
            });
        });
    }
    updateCounter();
}

function navigate(direction) {
    if (stackOrder.length===0) return;
    const idx = direction==="next"
        ? (currentIndex+1) % stackOrder.length
        : (currentIndex-1+stackOrder.length) % stackOrder.length;
    navigateTo(idx, direction);
    launchConfetti();
    runAnimal(direction);
}

document.getElementById("prevBtn").onclick  = () => navigate("prev");
document.getElementById("nextBtn").onclick  = () => navigate("next");
document.getElementById("goTopBtn").onclick = () => { navigateTo(0,"prev"); launchConfetti(); runAnimal("prev"); };

document.addEventListener("keydown", e => {
    if (e.target.tagName === "INPUT") return;
    if (e.key === "ArrowRight") { e.preventDefault(); navigate("next"); }
    if (e.key === "ArrowLeft")  { e.preventDefault(); navigate("prev"); }
});

const allCheckboxes = Array.from(control.querySelectorAll("input[type='checkbox']"));
document.getElementById("selectAllBtn").onclick = async () => {
    for (let cb of allCheckboxes) {
        if (!cb.checked) {
            cb.checked = true;
            cb.onchange();
            await new Promise(r => setTimeout(r, 500));
        }
    }
};

questions.addEventListener("click", e => {
    const stack = e.target.closest(".stack-wrapper");
    if (!stack) return;
    launchConfetti();
});

// ── SCREEN WAKE LOCK ──────────────────────────────────────────────────────────
let wakeLock = null;
async function requestWakeLock() {
    try {
        if ("wakeLock" in navigator) {
            wakeLock = await navigator.wakeLock.request("screen");
            wakeLock.addEventListener("release", ()=>{});
        }
    } catch(err) {}
}
document.addEventListener("visibilitychange", ()=>{
    if (wakeLock!==null && document.visibilityState==="visible") requestWakeLock();
});
requestWakeLock();
</script>
