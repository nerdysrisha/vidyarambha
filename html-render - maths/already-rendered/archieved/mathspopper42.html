<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Math Popper</title>
<!--V 42 aesthetics from claude -->
<style>
html, body {
    margin: 0;
    height: 100%;
    background: #0a0a0a;
    color: white;
    font-family: Arial, sans-serif;
}

#outer {
    margin: 20px;
    height: calc(100vh - 40px);
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow: hidden;
}

/* CONTROL PANEL */
#control {
    position: sticky;
    top: 0;
    z-index: 10;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px 16px;
    background: #0a0a0a;
    border: 1px solid #444;
    padding: 16px;
}

#control legend {
    padding: 0 10px;
    font-size: 18px;
    color: #aaa;
}

.ctrl-item {
    display: flex;
    align-items: center;
    gap: 12px;
    white-space: nowrap;
    font-size: 20px;
    padding: 6px 0;
}

.ctrl-item input[type="checkbox"] {
    width: 22px;
    height: 22px;
}

/* CONTROL PANEL WRAPPER */
#control-container {
    display: flex;
    flex-direction: column;
    transition: flex-basis 0.3s ease, min-height 0.3s ease;
    min-height: 40px;
    overflow: hidden;
}

#control-container.shrink {
    flex-basis: auto;
    min-height: 64px;
    padding: 4px 8px;
    border: 1px solid #333;
    border-radius: 8px;
    background: linear-gradient(135deg, #111 0%, #1a1a2e 100%);
}

#control-container.shrink #control {
    display: none;
}

/* TOP BAR */
#control-top-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    min-height: 52px;
}

#control-top-bar label,
#control-top-bar span {
    font-size: 16px;
}

/* BUTTONS - base */
button {
    padding: 8px 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    font-weight: bold;
    transition: transform 0.15s ease, filter 0.15s ease, box-shadow 0.15s ease;
}

button:hover {
    transform: scale(1.06);
    filter: brightness(1.2);
}

button:active {
    transform: scale(0.97);
}

/* Green buttons */
#selectAllBtn, #toggleAll, #saveBtn, #saveQuestionsBtn {
    background: #28a745;
    color: #fff;
    box-shadow: 0 0 8px rgba(40, 167, 69, 0.5);
}

#selectAllBtn:hover, #toggleAll:hover, #saveBtn:hover, #saveQuestionsBtn:hover {
    box-shadow: 0 0 16px rgba(40, 167, 69, 0.9);
}

/* Blue nav buttons */
.nav-btn {
    background: #0077cc;
    color: #fff;
    font-weight: bold;
    box-shadow: 0 0 8px rgba(0, 119, 204, 0.5);
}

.nav-btn:hover {
    background: #0099ff;
    box-shadow: 0 0 16px rgba(0, 153, 255, 0.9);
}

/* Amber fullscreen */
#fsBtn {
    background: #ff9900;
    color: #000;
    box-shadow: 0 0 8px rgba(255, 153, 0, 0.5);
}

#fsBtn:hover {
    box-shadow: 0 0 16px rgba(255, 153, 0, 0.9);
}

/* Timer */
#timerBtn {
    background: #28a745;
    color: #fff;
    box-shadow: 0 0 8px rgba(40, 167, 69, 0.5);
}

#resetTimer {
    background: #555;
    color: #fff;
    box-shadow: 0 0 6px rgba(255, 255, 255, 0.1);
}

#timerDisplay {
    font-size: 18px;
    font-weight: bold;
    color: #00c8ff;
    min-width: 56px;
    letter-spacing: 2px;
}

/* QUESTIONS PANEL */
#questions {
    display: flex;
    flex-direction: column;
    gap: 20px;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 12px;
    flex: 1;
    overflow-y: auto;
    min-height: 0;
    padding-bottom: 32px;
}

#questions legend {
    padding: 0 10px;
    font-size: 16px;
    color: #aaa;
}

#questions::-webkit-scrollbar { width: 12px; }
#questions::-webkit-scrollbar-track { background: #111; }
#questions::-webkit-scrollbar-thumb { background-color: #555; border-radius: 6px; border: 3px solid #111; }
#questions::-webkit-scrollbar-thumb:hover { background-color: #888; }

/* STACK WRAPPER */
.stack-wrapper {
    width: 100%;
    display: grid;
    grid-template-columns: 3fr 1fr;
    gap: 12px;
    min-height: 400px;
    align-items: stretch;
    transition: filter 0.25s ease, opacity 0.25s ease;
}

.stack-wrapper.dimmed {
    opacity: 0.25;
    filter: grayscale(60%);
}

.stack-wrapper.active {
    opacity: 1;
    filter: none;
    position: relative;
}

.stack-wrapper.active::after {
    content: "";
    position: absolute;
    inset: -10px;
    border-radius: 12px;
    outline: 3px solid transparent;
    animation: rainbowGlow 4s linear infinite;
    pointer-events: none;
}

/* Word problems: auto-size */
.stack-wrapper.word-problems {
    min-height: unset;
    height: auto;
    align-items: start;
}

.stack-wrapper.word-problems .stack-box {
    height: auto;
}

/* BOXES */
.stack-box {
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    background: #111;
    padding: 12px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    height: 100%;
}

.questions-box {
    border-left: 4px solid #28a745;
}

.questions-box.github-box {
    border-left: 4px solid #ff9900;
}

.answers-box {
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* TITLES */
.problem-title.inline-title {
    color: #28a745;
    font-weight: bold;
    margin-bottom: 8px;
    font-size: 24px;
}

.problem-title.github-title {
    color: #ff9900;
    font-weight: bold;
    margin-bottom: 8px;
    font-size: 24px;
}

/* QUESTION ROWS */
.question-row {
    display: flex;
    align-items: center;
    font-size: 40px;
    line-height: 2.2;
    padding-left: 40px;
}

.question-letter {
    width: 60px;
    text-align: right;
    margin-right: 20px;
    font-weight: bold;
}

.question-text { flex: 1; }

/* ANSWER ITEMS */
.answer-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    font-size: 40px;
}

.answer-item .answer-letter {
    width: 40px;
    text-align: right;
    margin-right: 12px;
    color: #28a745;
    font-weight: bold;
    flex-shrink: 0;
}

.answer {
    visibility: hidden;
    color: #58D68D;
    font-weight: bold;
}

.answer.show { visibility: visible; }

.answer-input {
    width: 90px;
    height: 28px;
    background: #000;
    color: #fff;
    border: 1px solid #444;
    border-radius: 6px;
    text-align: center;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

.answer-input:focus {
    border-color: #00c8ff;
    box-shadow: 0 0 8px rgba(0, 200, 255, 0.6);
}

/* CHECKBOX COLORS */
.inline-item { color: #28a745; }
.github-item { color: #ff9900; }

/* RAINBOW GLOW */
@keyframes rainbowGlow {
    0%   { outline-color: #ff004c; }
    20%  { outline-color: #ff9900; }
    40%  { outline-color: #ffee00; }
    60%  { outline-color: #28a745; }
    80%  { outline-color: #00c8ff; }
    100% { outline-color: #ff004c; }
}
</style>
</head>
<body>

<div id="outer">
    <div id="control-container" class="shrink">
        <div id="control-top-bar" style="margin:4px 8px;">
            <button id="selectAllBtn">All Qs</button>
            <label style="display:flex; align-items:center; gap:8px; font-size:16px;">
                <input type="checkbox" id="control-toggle" />
                Show Control Panel
            </label>
            <button id="toggleAll">Show</button>
            <button id="timerBtn">Start Timer</button>
            <button id="resetTimer">Reset</button>
            <span id="timerDisplay">00:00</span>
            <button id="goTop" class="nav-btn">⬆ Top Q</button>
            <button id="goBottom" class="nav-btn">⬇ Last Q</button>
            <button id="fsBtn" onclick="toggleFullscreen()">Go Fullscreen</button>
            <button id="saveBtn">Save Answers</button>
            <button id="saveQuestionsBtn">Save Questions</button>
        </div>
        <fieldset id="control">
            <legend>Control Panel</legend>
        </fieldset>
    </div>

    <fieldset id="questions">
        <legend>Questions Panel</legend>
    </fieldset>
</div>

<script>
const BASE_URL = "https://raw.githubusercontent.com/nerdysrisha/vidyarambha/refs/heads/main/maths/questions/";

const options = [
    ["number-names",         "1. Number Names",           "inline"],
    ["ascending",            "2. Ascending Order",        "inline"],
    ["descending",           "3. Descending Order",       "inline"],
    ["neg-pos-numbers",      "4. +ve/-ve Numbers",        "inline"],
    ["word-problems",        "5. Word Problems",          "github"],
    ["addend-left-missing",  "9. Find Left Addend",       "github"],
    ["addend-right-missing", "10. Find Right Addend",     "github"],
    ["gen-sub-no-borrow",    "12. Subtract - No Borrow",  "inline"],
    ["gen-sub-with-borrow",  "13. Subtract - With Borrow","inline"],
    ["minuend-missing",      "14. Find Minuend",          "github"],
    ["subtrahend-missing",   "15. Find Subtrahend",       "github"],
    ["multiplication-tables","17. Write Table",           "inline"],
    ["gen-mul-2-digit",      "19. Multiply 2 Digits",     "inline"],
    ["factor-left-missing",  "20. Find Left Factor",      "github"],
    ["factor-right-missing", "21. Find Right Factor",     "github"],
    ["basic-divisions",      "22. Divisions",             "inline"],
    ["dividend-missing",     "23. Find Dividend",         "github"],
    ["divisor-missing",      "24. Find Divisor",          "github"],
    ["bodmas",               "25. Solve BODMAS",          "github"],
    ["pattern-completion",   "33. Pattern Completion",    "github"],
    ["draw-clock",           "34. Draw Clock",            "inline"],
    ["tell-time",            "35. Tell Time",             "inline"],
    ["drawing-shapes",       "36. Drawing Shapes",        "github"],
    ["geometric-shapes",     "37. Geometric Shapes",      "github"]
];

const control   = document.getElementById("control");
const questions = document.getElementById("questions");
const toggleAll = document.getElementById("toggleAll");
let showAll = false;
const stacks = {};

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

options.forEach(([val, label, type]) => {
    const wrap = document.createElement("label");
    wrap.className = "ctrl-item " + (type === "inline" ? "inline-item" : "github-item");
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.onchange = () => cb.checked ? addStack(val) : removeStack(val);
    wrap.append(cb, document.createTextNode(label));
    control.appendChild(wrap);
});

const selectAllBtn = document.getElementById("selectAllBtn");
const checkboxes   = Array.from(control.querySelectorAll("input[type='checkbox']"));

selectAllBtn.onclick = async () => {
    for (let cb of checkboxes) {
        if (!cb.checked) {
            cb.checked = true;
            cb.onchange();
            await new Promise(r => setTimeout(r, 500));
        }
    }
};

toggleAll.onclick = () => {
    if (!showAll) {
        if (prompt("Enter PIN") !== "0000") return;
    }
    showAll = !showAll;
    document.querySelectorAll(".answer").forEach(a => a.classList.toggle("show", showAll));
    document.querySelectorAll("#questions .question-row img").forEach(img => {
        img.style.display = showAll ? "block" : "none";
    });
    toggleAll.textContent = showAll ? "Hide" : "Show";
};

function renderSplitRow(letter, question, answer) {
    return {
        questionHTML: `<div class="question-row">
            <span class="question-letter">(${letter})</span>
            <span class="question-text">${question}</span>
        </div>`,
        answerHTML: `<div class="answer-item">
            <span class="answer-letter">(${letter})</span>
            <input type="text" class="answer-input" />
            <span class="answer">${answer}</span>
        </div>`
    };
}

function addStack(val) {
    if (stacks[val]) return;
    const wrapper = document.createElement("div");
    wrapper.className = "stack-wrapper" + (val === "word-problems" ? " word-problems" : "");
    const questionsBox = document.createElement("div");
    questionsBox.className = "stack-box questions-box";
    const answersBox = document.createElement("div");
    answersBox.className = "stack-box answers-box";
    wrapper.appendChild(questionsBox);
    wrapper.appendChild(answersBox);
    stacks[val] = wrapper;
    questions.appendChild(wrapper);
    wrapper.scrollIntoView({ behavior: "smooth", block: "end" });
    generate(questionsBox, answersBox, val);
}

function removeStack(val) {
    stacks[val]?.remove();
    delete stacks[val];
}

function generate(questionsBox, answersBox, val) {
    questionsBox.innerHTML = "";
    answersBox.innerHTML   = "";

    const option   = options.find(o => o[0] === val);
    const isGithub = option?.[2] === "github";
    const titleClass = isGithub ? "github-title" : "inline-title";

    if (option) {
        questionsBox.innerHTML = `<div class="problem-title ${titleClass}">${option[1]}</div>`;
        questionsBox.classList.toggle("github-box", isGithub);
    }

    if (val === "gen-sub-no-borrow") {
        for (let i = 0; i < 2; i++) {
            let a  = rand(100, 999);
            let aD = String(a).split('').map(Number);
            let bD = String(rand(100, 999)).split('').map((d, j) => Math.min(d, aD[j]));
            let b  = parseInt(bD.join(''));
            let letter = String.fromCharCode(97 + i);
            let row = renderSplitRow(letter, `${a} - ${b} =`, a - b);
            questionsBox.innerHTML += row.questionHTML;
            answersBox.innerHTML   += row.answerHTML;
        }
    }
    else if (val === "gen-sub-with-borrow") {
        for (let i = 0; i < 2; i++) {
            let a = rand(100, 999), b = rand(100, 999);
            if (b > a) [a, b] = [b, a];
            let letter = String.fromCharCode(97 + i);
            let row = renderSplitRow(letter, `${a} - ${b} =`, a - b);
            questionsBox.innerHTML += row.questionHTML;
            answersBox.innerHTML   += row.answerHTML;
        }
    }
    else if (val === "gen-mul-2-digit") {
        for (let i = 0; i < 2; i++) {
            let a = rand(10, 99), b = rand(10, 99);
            let letter = String.fromCharCode(97 + i);
            let row = renderSplitRow(letter, `${a} × ${b} =`, a * b);
            questionsBox.innerHTML += row.questionHTML;
            answersBox.innerHTML   += row.answerHTML;
        }
    }
    else if (val === "number-names") {
        const letters = ["a", "b", "c", "d"];
        [rand(100, 999), rand(100, 999), rand(1000, 9999), rand(1000, 9999)].forEach((n, i) => {
            let row = renderSplitRow(letters[i], `${n}`, n);
            questionsBox.innerHTML += row.questionHTML;
            answersBox.innerHTML   += row.answerHTML;
        });
    }
    else if (val === "basic-divisions") {
        for (let i = 0; i < 4; i++) {
            let b = rand(2, 9), a = b * rand(2, 9);
            let letter = String.fromCharCode(97 + i);
            let row = renderSplitRow(letter, `${a} ÷ ${b} =`, a / b);
            questionsBox.innerHTML += row.questionHTML;
            answersBox.innerHTML   += row.answerHTML;
        }
    }
    else if (val === "ascending" || val === "descending") {
        for (let i = 0; i < 2; i++) {
            let arr    = [...Array(6)].map(() => rand(10, 99));
            let letter = String.fromCharCode(97 + i);
            let s = [...arr].sort((a, b) => val === "ascending" ? a - b : b - a);
            let row = renderSplitRow(letter, arr.join(", "), s.join(", "));
            questionsBox.innerHTML += row.questionHTML;
            answersBox.innerHTML   += row.answerHTML;
        }
    }
    else if (val === "draw-clock") {
        for (let i = 0; i < 2; i++) {
            let letter = String.fromCharCode(97 + i);
            let time   = `${rand(1,12)}:${rand(0,59).toString().padStart(2,"0")}`;
            let row = renderSplitRow(letter, time, "");
            questionsBox.innerHTML += row.questionHTML;
            answersBox.innerHTML   += row.answerHTML;
        }
    }
    else if (val === "tell-time") {
        let first = rand(1, 68), second;
        do { second = rand(1, 68); } while (second === first);
        const letters = ["a", "b"];
        const clocksContainer = document.createElement("div");
        clocksContainer.style.cssText = "display:flex; gap:140px; justify-content:flex-start; margin-bottom:12px;";
        [first, second].forEach((n, i) => {
            const imgWrapper = document.createElement("div");
            imgWrapper.style.cssText = "display:flex; flex-direction:column; align-items:center;";
            const img = document.createElement("img");
            img.src = `https://raw.githubusercontent.com/nerdysrisha/vidyarambha/main/clocks/clock${n}.png`;
            img.alt = `Clock ${n}`;
            img.style.cssText = "width:260px; height:260px;";
            const filename = document.createElement("span");
            filename.textContent = `(${letters[i]}) clock${n}.png`;
            filename.style.cssText = "font-size:14px; margin-top:4px; color:#aaa;";
            imgWrapper.appendChild(img);
            imgWrapper.appendChild(filename);
            clocksContainer.appendChild(imgWrapper);
            const answerItem = document.createElement("div");
            answerItem.className = "answer-item";
            answerItem.style.marginBottom = "12px";
            const input  = document.createElement("input");
            input.type   = "text";
            input.className = "answer-input";
            const answer = document.createElement("span");
            answer.className = "answer";
            answerItem.appendChild(input);
            answerItem.appendChild(answer);
            answersBox.appendChild(answerItem);
        });
        questionsBox.appendChild(clocksContainer);
    }
    else if (val === "geometric-shapes") {
        fetch("https://api.github.com/repos/nerdysrisha/vidyarambha/contents/geometric-shapes")
            .then(res => res.json())
            .then(files => {
                const pngs = files.filter(f => f.name.endsWith(".png"));
                const picked = [];
                while (picked.length < 4) {
                    const f = pngs[rand(0, pngs.length - 1)];
                    if (!picked.includes(f)) picked.push(f);
                }
                const letters = ["a", "b", "c", "d"];
                const container = document.createElement("div");
                container.style.cssText = "display:flex; gap:60px; margin-bottom:12px;";
                picked.forEach((file, i) => {
                    const imgWrapper = document.createElement("div");
                    imgWrapper.style.cssText = "display:flex; flex-direction:column; align-items:center;";
                    const img = document.createElement("img");
                    img.src = file.download_url;
                    img.style.cssText = "width:180px; height:180px;";
                    const label = document.createElement("span");
                    label.textContent = `(${letters[i]})`;
                    label.style.cssText = "font-size:14px; margin-top:4px; color:#aaa;";
                    imgWrapper.appendChild(img);
                    imgWrapper.appendChild(label);
                    container.appendChild(imgWrapper);
                    const answerItem = document.createElement("div");
                    answerItem.className = "answer-item";
                    answerItem.style.marginBottom = "12px";
                    const input  = document.createElement("input");
                    input.type   = "text";
                    input.className = "answer-input";
                    const answer = document.createElement("span");
                    answer.className = "answer";
                    answer.textContent = file.name.replace(".png", "");
                    answerItem.appendChild(input);
                    answerItem.appendChild(answer);
                    answersBox.appendChild(answerItem);
                });
                questionsBox.appendChild(container);
            });
    }
    else if (val === "drawing-shapes") {
        fetch("https://api.github.com/repos/nerdysrisha/vidyarambha/contents/geometric-shapes")
            .then(res => res.json())
            .then(files => {
                const pngs = files.filter(f => f.name.endsWith(".png"));
                const picked = [];
                while (picked.length < 4 && picked.length < pngs.length) {
                    const f = pngs[rand(0, pngs.length - 1)];
                    if (!picked.includes(f)) picked.push(f);
                }
                const letters = ["a", "b", "c", "d"];
                picked.forEach((file, i) => {
                    const questionItem = document.createElement("div");
                    questionItem.className = "question-row";
                    questionItem.style.position = "relative";
                    const qText = document.createElement("span");
                    qText.className = "question-text";
                    qText.innerHTML = `<span class="question-letter">(${letters[i]})</span> ${file.name.replace(".png", "")}`;
                    const img = document.createElement("img");
                    img.src = file.download_url;
                    img.style.cssText = "width:200px; height:200px; display:none; margin-top:8px;";
                    questionItem.appendChild(qText);
                    questionItem.appendChild(img);
                    questionsBox.appendChild(questionItem);
                    const answerItem = document.createElement("div");
                    answerItem.className = "answer-item";
                    answerItem.style.marginBottom = "12px";
                    answerItem.innerHTML = `<span class="answer-letter">(${letters[i]})</span> <span class="answer">${file.name.replace(".png", "")}</span>`;
                    answersBox.appendChild(answerItem);
                });
            })
            .catch(err => console.error("Error fetching drawing-shapes:", err));
    }
    else if (val === "neg-pos-numbers") {
        for (let i = 0; i < 2; i++) {
            let start = rand(1, 95), end = start + rand(3, 5);
            let questionText, answerText;
            if (rand(1, 2) === 1) {
                questionText = `Write negative numbers from ${start} to ${end}`;
                let nums = [];
                for (let n = end; n >= start; n--) nums.push(`-${n}`);
                answerText = nums.join(", ");
            } else {
                let a = rand(1, 5), b = rand(1, 5);
                questionText = `Write numbers from -${a} to ${b}`;
                let nums = [];
                for (let n = -a; n <= b; n++) nums.push(n);
                answerText = nums.join(", ");
            }
            let letter = String.fromCharCode(97 + i);
            let row = renderSplitRow(letter, questionText, answerText);
            questionsBox.innerHTML += row.questionHTML;
            answersBox.innerHTML   += row.answerHTML;
        }
    }
    else if (val === "multiplication-tables") {
        const table = rand(12, 19);
        questionsBox.innerHTML += `<div class="question-row" style="font-size:42px; padding-left:40px;">Write table ${table}</div>`;
        for (let i = 1; i <= 10; i++) {
            answersBox.innerHTML += `<div class="answer-item">
                <span class="answer-letter">(${String.fromCharCode(96 + i)})</span>
                <input type="text" class="answer-input" />
                <span class="answer">${table * i}</span>
            </div>`;
        }
    }
    else {
        fetch(BASE_URL + val + ".json")
            .then(r => r.json())
            .then(d => {
                const numQuestions = val === "word-problems" ? 4 : 2;
                const idx = [...Array(d.questions.length).keys()]
                    .sort(() => 0.5 - Math.random())
                    .slice(0, numQuestions);
                idx.forEach((i, j) => {
                    let letter = String.fromCharCode(97 + j);
                    let questionText = d.questions[i];
                    if (val === "bodmas") {
                        questionText = questionText.replace(/([+\-×÷*/x])/gi, " $1 ").replace(/\s+/g, " ");
                        questionText = `<span style="font-size:1.5em; letter-spacing:0.15em;">${questionText}</span>`;
                    }
                    let row = renderSplitRow(letter, questionText, d.answers[i]);
                    questionsBox.innerHTML += row.questionHTML;
                    answersBox.innerHTML   += row.answerHTML;
                });
            });
    }
}

const controlContainer = document.getElementById("control-container");
const controlToggle    = document.getElementById("control-toggle");
controlToggle.checked  = false;
controlToggle.onchange = () => controlContainer.classList.toggle("shrink", !controlToggle.checked);

// TIMER
let timer = null, seconds = 0;
const timerBtn     = document.getElementById("timerBtn");
const resetTimer   = document.getElementById("resetTimer");
const timerDisplay = document.getElementById("timerDisplay");

function updateTimerDisplay() {
    timerDisplay.textContent = `${String(Math.floor(seconds/60)).padStart(2,"0")}:${String(seconds%60).padStart(2,"0")}`;
}

timerBtn.onclick = () => {
    if (!timer) {
        timer = setInterval(() => { seconds++; updateTimerDisplay(); }, 1000);
        timerBtn.textContent = "Pause";
        timerBtn.style.background  = "#cc3300";
        timerBtn.style.boxShadow   = "0 0 12px rgba(204,51,0,0.8)";
    } else {
        clearInterval(timer); timer = null;
        timerBtn.textContent = "Start Timer";
        timerBtn.style.background  = "#28a745";
        timerBtn.style.boxShadow   = "0 0 8px rgba(40,167,69,0.5)";
    }
};

resetTimer.onclick = () => {
    clearInterval(timer); timer = null; seconds = 0;
    updateTimerDisplay();
    timerBtn.textContent = "Start Timer";
    timerBtn.style.background = "#28a745";
    timerBtn.style.boxShadow  = "0 0 8px rgba(40,167,69,0.5)";
};

// FOCUS / DIM
let activeStack = null;

questions.addEventListener("click", e => {
    const stack = e.target.closest(".stack-wrapper");
    if (!stack) return;
    if (activeStack === stack) {
        document.querySelectorAll(".stack-wrapper").forEach(s => s.classList.remove("active", "dimmed"));
        activeStack = null;
        return;
    }
    document.querySelectorAll(".stack-wrapper").forEach(s => {
        s.classList.toggle("active",  s === stack);
        s.classList.toggle("dimmed", s !== stack);
    });
    activeStack = stack;
    const cr = questions.getBoundingClientRect(), sr = stack.getBoundingClientRect();
    questions.scrollTo({ top: questions.scrollTop + (sr.top - cr.top) - (cr.height / 2) + (sr.height / 2), behavior: "smooth" });
});

function activateStack(stack) {
    document.querySelectorAll(".stack-wrapper").forEach(s => {
        s.classList.toggle("active",  s === stack);
        s.classList.toggle("dimmed", s !== stack);
    });
    activeStack = stack;
}

document.getElementById("goTop").onclick = () => {
    const first = questions.querySelector(".stack-wrapper");
    if (!first) return;
    questions.scrollTo({ top: 0, behavior: "smooth" });
    activateStack(first);
};

document.getElementById("goBottom").onclick = () => {
    const all  = questions.querySelectorAll(".stack-wrapper");
    const last = all[all.length - 1];
    if (!last) return;
    questions.scrollTo({ top: questions.scrollHeight - questions.clientHeight, behavior: "smooth" });
    activateStack(last);
};

function toggleFullscreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
        document.getElementById("fsBtn").innerText = "Exit Fullscreen";
    } else {
        document.exitFullscreen();
        document.getElementById("fsBtn").innerText = "Go Fullscreen";
    }
}

// SAVE ANSWERS
document.getElementById("saveBtn").onclick = () => {
    const all = document.querySelectorAll(".stack-wrapper");
    let output = [];
    all.forEach(stack => {
        const title = stack.querySelector(".problem-title")?.innerText;
        if (title) output.push(`\n=== ${title} ===`);
        if (title?.includes("Geometric Shapes")) {
            const imgs = stack.querySelectorAll(".questions-box img");
            const inputs = stack.querySelectorAll(".answer-item input");
            imgs.forEach((img, i) => output.push(`${img.src.split("/").pop()}  =>  ${inputs[i]?.value || ""}`));
            return;
        }
        const qs  = stack.querySelectorAll(".question-row");
        const ans = stack.querySelectorAll(".answer-item input");
        qs.forEach((q, i) => output.push(`${q.innerText.replace(/\s+/g," ").trim()}  =>  ${ans[i]?.value || ""}`));
    });
    Object.assign(document.createElement("a"), {
        href: URL.createObjectURL(new Blob([output.join("\n")], { type: "text/plain" })),
        download: "answers.txt"
    }).click();
};

// SAVE QUESTIONS
document.getElementById("saveQuestionsBtn").onclick = () => {
    const all = document.querySelectorAll(".stack-wrapper");
    let output = [];
    all.forEach(stack => {
        const title = stack.querySelector(".problem-title")?.innerText;
        if (title) output.push(`\n=== ${title} ===`);
        if (title?.includes("Geometric Shapes")) {
            stack.querySelectorAll(".questions-box img").forEach(img => output.push(img.src.split("/").pop()));
            return;
        }
        stack.querySelectorAll(".question-row").forEach(q => output.push(q.innerText.replace(/\s+/g, " ").trim()));
    });
    const ts = new Date().toISOString().replace(/[:.]/g, "-");
    Object.assign(document.createElement("a"), {
        href: URL.createObjectURL(new Blob([output.join("\n")], { type: "text/plain" })),
        download: `questions-only-${ts}.txt`
    }).click();
};

// SCREEN WAKE LOCK
let wakeLock = null;
async function requestWakeLock() {
    try {
        if ('wakeLock' in navigator) {
            wakeLock = await navigator.wakeLock.request('screen');
            wakeLock.addEventListener('release', () => {});
        }
    } catch (err) {}
}
document.addEventListener('visibilitychange', () => {
    if (wakeLock !== null && document.visibilityState === 'visible') requestWakeLock();
});
requestWakeLock();
</script>
