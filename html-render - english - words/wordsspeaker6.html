<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Word Speaker</title>
<!--v6 - Repeat Symbol -->
<style>
html, body {
    margin: 0;
    height: 100%;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

#outer {
    margin: 20px;
    height: calc(100vh - 40px);
    display: flex;
    flex-direction: column;
    gap: 20px;
}

#control-container {
    display: flex;
    flex-direction: column;
    min-height: 40px;
    overflow: hidden;
    border: 1px solid #444;
    padding: 8px;
}

#counter {
    color: #aaa;
}

#panels {
    display: grid;
    grid-template-columns: 4fr 1fr;
    gap: 12px;
    flex: 1;
    min-height: 0;
}

#center {
    border: 1px solid #222;
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: clamp(20px, 8vw, 100px);
    overflow: hidden;
    padding: 12px;
    position: relative; /* added */
}


#center .sentence {
    font-size: clamp(12px, 3vw, 30px);
    margin-top: 10px;
    color: #ccc;
}

#left {
    border: 1px solid #222;
    background: #111;
    display: flex;
    flex-direction: column;
    padding: 12px;
    overflow-y: auto;
}

.word-container {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.emoji {
    width: 120px;
    height: 120px;
    margin-top: 10px;
}

button {
    padding: 4px 8px;
    border: none;
    cursor: pointer;
    background: #58D68D;
    color: black;
}

.dark-select {
    padding: 4px 8px;
    font-size: 14px;
    background: #111;
    color: #fff;
    border: 1px solid #444;
    cursor: pointer;
}
</style>
</head>
<body>

<div id="outer">
    <div id="control-container">
        <div style="display:flex; align-items:center; justify-content:space-between; width:100%;">
            <select id="patternSelector" class="dark-select">
                <option value="3-letter-words-speaking" selected>3 Letter Words Speaking</option>
            </select>
            <div id="counter">0 / 0</div>
        </div>
    </div>

    <div id="panels">
<div id="center" tabindex="0">
    <div class="content-area"></div> <!-- this will be replaced by your animations -->
    <button id="repeatBtn" style="
        position: absolute;
        top: 10px;
        right: 10px;
        background: #F4D03F;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        font-size: 20px;
        font-weight: bold;
        z-index: 10;
    ">⟳</button>
</div>

        <div id="left"></div>
    </div>
</div>

<script>
let words = [], sentences = [], leftWords = [], centerIndex = 0, totalWords = 0;
const centerBox = document.getElementById('center');
const leftBox = document.getElementById('left');
const counterEl = document.getElementById('counter');
const patternSelector = document.getElementById('patternSelector');

// 0 = speak word, 1 = speak sentence, 2 = display word+sentence
let step = 0;

const EMOJI_COUNT = 55;
function getRandomEmojiUrl() {
    const n = Math.floor(Math.random()*EMOJI_COUNT)+1;
    return `https://raw.githubusercontent.com/nerdysrisha/vidyarambha/main/emojis/emoji${n}.gif`;
}

const repeatBtn = document.getElementById('repeatBtn');

function repeatCurrent() {
    if(centerIndex >= totalWords) return;
    speak(words[centerIndex], () => {
        speak(sentences[centerIndex], () => {
            centerBox.focus(); // return focus so spacebar works
        });
    });
}

repeatBtn.addEventListener('click', repeatCurrent);


const contentArea = centerBox.querySelector('.content-area');

function animateWordAndSentence(word, sentence, color) {
    contentArea.innerHTML = `
        <div class="word-container">
            <span class="word" style="color:${color}"></span>
            <img class="emoji" src="${getRandomEmojiUrl()}">
            <span class="sentence">${sentence}</span>
        </div>
    `;
    const wordSpan = contentArea.querySelector('.word');
    let i = 0;
    const interval = setInterval(() => {
        wordSpan.textContent += word[i++];
        if (i >= word.length) clearInterval(interval);
    }, 200);
}

function getJsonUrl(p){
    return `https://raw.githubusercontent.com/nerdysrisha/vidyarambha/main/english/speaking/${p}.json`;
}

 
function loadWords(p){
    fetch(getJsonUrl(p))
    .then(r => r.json())
    .then(d => {
        words = d.words;
        sentences = d.sentences;
        totalWords = words.length;
        leftWords = [];
        centerIndex = 0;
        contentArea.innerHTML = '😃';  // only replace the content area
        counterEl.textContent = `0 / ${totalWords}`;
        step = 0;
        centerBox.focus();
    });
}

function speak(text, callback){
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'en-US';
    utter.rate = 0.8; // slower
    const voices = speechSynthesis.getVoices();
    const femaleVoice = voices.find(v => v.lang.startsWith('en') && v.name.toLowerCase().includes('female'));
    if(femaleVoice) utter.voice = femaleVoice;
    utter.onend = callback;
    speechSynthesis.speak(utter);
}

function randomColor(){
    return `rgb(${Math.random()*255|0},${Math.random()*255|0},${Math.random()*255|0})`;
}

function renderLeft(){
    leftBox.innerHTML = '';
    leftWords.forEach(w => {
        const d = document.createElement('div');
        d.textContent = w;
        leftBox.appendChild(d);
    });
    leftBox.scrollTop = leftBox.scrollHeight;
}

function nextStep() {
    if(centerIndex >= totalWords) {
        contentArea.innerHTML = '🎉';
        return;
    }

    if(step === 0){
        speak(words[centerIndex], () => {});
        step = 1;
    } else if(step === 1){
        speak(sentences[centerIndex], () => {});
        step = 2;
    } else if(step === 2){
        animateWordAndSentence(words[centerIndex], sentences[centerIndex], randomColor());
        leftWords.push(words[centerIndex]);
        renderLeft();
        counterEl.textContent = `${leftWords.length} / ${totalWords}`;
        centerIndex++;
        step = 0;
    }
}

patternSelector.addEventListener('change', () => loadWords(patternSelector.value));
document.body.addEventListener('keydown', e => {
    if(e.code === 'Space' || e.code === 'Enter') nextStep();
});

loadWords(patternSelector.value);
</script>

</body>
</html>
